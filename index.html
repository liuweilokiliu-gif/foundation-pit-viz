<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>基坑支护工程进度驾驶舱</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-panel: #1a2235;
  --bg-card: #1e293b;
  --border: #2d3a4f;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --status-done: #00c853;
  --status-doing: #ffab00;
  --status-pending: #546e7a;
  --pile-reinforced: #42a5f5;
  --pile-plain: #bbdefb;
  --pile-jetgrout: #ce93d8;
  --pile-micro: #ffcc80;
  --pile-column: #66bb6a;
  --beam-crown: #fdd835;
  --beam-strut: #ef5350;
  --beam-corner: #ff7043;
  --slab: #4db6ac;
}

/* ===== Reset & Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== Top Header ===== */
.header {
  height: 56px;
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-panel));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
}
.header-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--accent-light);
  letter-spacing: 2px;
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  flex-wrap: nowrap;
  overflow: hidden;
}
.header-controls label {
  font-size: 13px;
  color: var(--text-secondary);
}
.date-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
}
.filter-select {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
}
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: var(--accent-light); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
}
.btn-outline:hover {
  background: var(--accent);
  color: #fff;
}

/* ===== Main Layout ===== */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== Panel Toggle Buttons ===== */
.panel-toggle {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 48px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  transition: background 0.2s;
}
.panel-toggle:hover { background: var(--accent); color: #fff; }
.toggle-left {
  left: 0;
  border-radius: 0 6px 6px 0;
  border-left: none;
}
.toggle-right {
  right: 0;
  border-radius: 6px 0 0 6px;
  border-right: none;
}

/* ===== Side Panels ===== */
.panel {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  padding: 16px;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: width 0.3s ease, min-width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
  contain: layout;
}
.panel.collapsed {
  width: 0;
  min-width: 0;
  padding: 0;
  overflow: hidden;
  opacity: 0;
}
.panel-right {
  border-right: none;
  border-left: 1px solid var(--border);
}
.panel-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== Chart Cards ===== */
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.chart-card-title {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-weight: 600;
}

/* ===== Pie Chart (CSS only) ===== */
.pie-container {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.pie-visual {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  margin: 0 auto 12px;
  position: relative;
}
.pie-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--bg-card);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.pie-center-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--status-done);
}
.pie-center-label {
  font-size: 10px;
  color: var(--text-muted);
}
.legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-label { color: var(--text-secondary); }
.legend-value { margin-left: auto; color: var(--text-primary); font-weight: 600; }

/* ===== Bar Chart (CSS) ===== */
.bar-chart {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.bar-label {
  font-size: 11px;
  color: var(--text-secondary);
  width: 70px;
  flex-shrink: 0;
  text-align: right;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bar-track {
  flex: 1;
  height: 18px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
  min-width: 0;
}
.bar-value {
  font-size: 11px;
  color: var(--text-primary);
  width: 36px;
  text-align: right;
  font-weight: 600;
}

/* ===== Daily Bar Chart ===== */
.daily-bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 140px;
  padding-top: 8px;
  overflow: hidden;
}
.daily-bar-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
}
.daily-bar {
  width: 100%;
  border-radius: 3px 3px 0 0;
  transition: height 0.4s ease;
  min-height: 2px;
  position: relative;
}
.daily-bar-plan {
  background: var(--accent);
  opacity: 0.5;
}
.daily-bar-actual {
  background: var(--status-done);
}
.daily-label {
  font-size: 10px;
  color: var(--text-muted);
}
.daily-bar-tooltip {
  display: none;
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-primary);
  background: var(--bg-panel);
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
}
.daily-bar-group:hover .daily-bar-tooltip { display: block; }

/* ===== Center Area ===== */
.center {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
  overflow: hidden;
}
.plan-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  background-color: #0d1520;
  background-image:
    linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}
.plan-container:active { cursor: grabbing; }
.plan-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  transform-origin: 0 0;
}
.plan-svg text {
  fill: var(--text-muted);
  font-size: 10px;
  user-select: none;
}

/* ===== Pile Styles ===== */
.pile-circle {
  cursor: pointer;
  transition: opacity 0.2s, filter 0.2s;
}
.pile-circle:hover {
  filter: brightness(1.4);
  opacity: 0.85;
}
.pile-label {
  font-size: 9px;
  fill: var(--text-muted);
  pointer-events: none;
  user-select: none;
}

/* ===== Line Styles ===== */
.beam-line-bg {
  stroke: var(--status-pending);
  opacity: 0.3;
}
.beam-line-drawn {
  stroke-linecap: round;
  cursor: pointer;
  transition: opacity 0.2s;
}
.beam-line-drawn:hover {
  filter: brightness(1.3);
  opacity: 0.85;
}

/* ===== Polygon Styles ===== */
.slab-poly-bg {
  fill: var(--status-pending);
  opacity: 0.15;
}
.slab-poly-drawn {
  stroke-width: 1.5;
  cursor: pointer;
  transition: opacity 0.2s;
}
.slab-poly-drawn:hover {
  filter: brightness(1.3);
  opacity: 0.85;
}
.slab-region-drawn {
  cursor: pointer;
  transition: opacity 0.2s;
}
.slab-region-drawn:hover {
  filter: brightness(1.3);
  opacity: 0.85;
}

/* ===== Zoom Controls ===== */
.zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}
.zoom-btn {
  width: 36px;
  height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.zoom-btn:hover { background: var(--bg-panel); }

/* ===== Legend Bar on Plan ===== */
.plan-legend {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(10,14,26,0.85);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.plan-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-secondary);
}
.plan-legend-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}
.plan-legend-line {
  width: 20px;
  height: 4px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ===== Drawing Mode Indicator ===== */
.mode-indicator {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(10,14,26,0.9);
  border: 1px solid var(--status-doing);
  border-radius: 8px;
  padding: 10px 14px;
  z-index: 10;
  font-size: 13px;
  color: var(--status-doing);
  display: none;
  align-items: center;
  gap: 8px;
}
.mode-indicator.active { display: flex; }

/* ===== Bottom Stats ===== */
.bottom-stats {
  height: 80px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
}
.stat-card {
  flex: 1;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.stat-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.stat-info { display: flex; flex-direction: column; }
.stat-value { font-size: 20px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--text-muted); }

/* ===== Status Popup ===== */
.status-popup {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  z-index: 100;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  min-width: 180px;
}
.status-popup.active { display: block; }
.status-popup-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.status-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 13px;
}
.status-option:hover { background: rgba(255,255,255,0.05); }
.status-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-option.selected {
  background: rgba(59,130,246,0.15);
  border: 1px solid var(--accent);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Detail Table ===== */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.detail-table th {
  background: rgba(59,130,246,0.1);
  color: var(--accent-light);
  padding: 8px 6px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
.detail-table td {
  padding: 7px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
}
.detail-table tr:hover td {
  background: rgba(255,255,255,0.02);
}
.progress-mini {
  display: inline-block;
  width: 50px;
  height: 6px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  overflow: hidden;
  vertical-align: middle;
}
.progress-mini-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s;
}

/* ===== Snapshot badge ===== */
.snapshot-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 10px;
  background: rgba(59,130,246,0.1);
  color: var(--accent-light);
}

/* ===== Comparison bars ===== */
.compare-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
}
.compare-label {
  font-size: 11px;
  color: var(--text-muted);
  width: 40px;
}
.compare-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.compare-bar {
  height: 10px;
  border-radius: 3px;
  transition: width 0.4s;
}
.compare-bar-plan { background: var(--accent); opacity: 0.5; }
.compare-bar-actual { background: var(--status-done); }
.compare-val {
  font-size: 11px;
  width: 30px;
  text-align: right;
  color: var(--text-secondary);
  font-weight: 600;
}

/* ===== Tools Panel ===== */
.tools-panel {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}
.tool-btn {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.tool-btn:hover, .tool-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ===== Plan toolbar ===== */
.plan-toolbar {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10,14,26,0.9);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 10px;
  z-index: 10;
  display: flex;
  gap: 6px;
}
.plan-tool-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 5px 12px;
  border-radius: 5px;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.2s;
}
.plan-tool-btn:hover, .plan-tool-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ===== Tooltip ===== */
.svg-tooltip {
  position: absolute;
  background: rgba(10,14,26,0.92);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  z-index: 50;
  font-size: 12px;
  color: var(--text-primary);
  pointer-events: none;
  white-space: nowrap;
  display: none;
}
.svg-tooltip.active { display: block; }
.svg-tooltip .tt-row { display: flex; gap: 8px; margin: 2px 0; }
.svg-tooltip .tt-label { color: var(--text-muted); }
.svg-tooltip .tt-val { color: var(--text-primary); font-weight: 600; }

/* ===== Selected highlight ===== */
.beam-line-drawn.selected, .slab-poly-drawn.selected {
  filter: drop-shadow(0 0 4px #fff) brightness(1.4) !important;
  opacity: 1 !important;
}

/* ===== Popup enhancements ===== */
.popup-info {
  font-size: 12px;
  color: var(--text-secondary);
  padding: 6px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.popup-info-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin: 3px 0;
}
.popup-info-label { color: var(--text-muted); }
.popup-info-value { color: var(--text-primary); font-weight: 600; }
.popup-delete-btn {
  width: 100%;
  background: rgba(239,83,80,0.15);
  border: 1px solid rgba(239,83,80,0.3);
  color: #ef5350;
  padding: 6px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  margin-top: 8px;
  transition: background 0.2s;
}
.popup-delete-btn:hover {
  background: rgba(239,83,80,0.3);
}
</style>
</head>
<body>

<!-- ===== HEADER ===== -->
<header class="header">
  <div class="header-title">🏗️ 基坑支护工程进度驾驶舱</div>
  <div class="header-controls">
    <label>📅 日期：</label>
    <input type="date" class="date-input" id="dateInput" value="2026-07-11">
    <button class="btn btn-outline" onclick="goToday()">今天</button>
    <span class="snapshot-badge" id="snapshotBadge">📷 已快照</span>
    <label>🧹 筛选：</label>
    <select class="filter-select" id="filterSelect" onchange="applyFilter()">
      <option value="all">全部构件</option>
      <option value="pile">桩类</option>
      <option value="beam">梁类</option>
      <option value="slab">盖板</option>
    </select>
    <select class="filter-select" id="statusFilter" onchange="applyFilter()">
      <option value="all">全部状态</option>
      <option value="done">已完成</option>
      <option value="doing">施工中</option>
      <option value="pending">未施工</option>
    </select>
  </div>
</header>

<!-- ===== MAIN ===== -->
<div class="main">

  <!-- Left Panel -->
  <aside class="panel" id="leftPanel">
    <div class="panel-title">📊 进度概览</div>

    <!-- Pie Chart -->
    <div class="chart-card">
      <div class="chart-card-title">各工程类型进度占比</div>
      <div class="pie-container">
        <div class="pie-visual" id="pieChart">
          <div class="pie-center">
            <div class="pie-center-value" id="pieTotalRate">35%</div>
            <div class="pie-center-label">总完成率</div>
          </div>
        </div>
        <div class="legend" id="pieLegend"></div>
      </div>
    </div>

    <!-- Horizontal Bar Chart -->
    <div class="chart-card">
      <div class="chart-card-title">各类型完成进度</div>
      <div class="bar-chart" id="barChart"></div>
    </div>
  </aside>

  <!-- Center -->
  <div class="center">
    <div class="plan-container" id="planContainer">
      <svg class="plan-svg" id="planSvg" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid meet"></svg>

      <!-- Plan Legend -->
      <div class="plan-legend">
        <div class="plan-legend-item">
          <div class="plan-legend-dot" style="background:var(--pile-reinforced)"></div>
          <span>荤桩</span>
        </div>
        <div class="plan-legend-item">
          <div class="plan-legend-dot" style="background:var(--pile-plain)"></div>
          <span>素桩</span>
        </div>
        <div class="plan-legend-item">
          <div class="plan-legend-dot" style="background:var(--pile-jetgrout)"></div>
          <span>旋喷桩</span>
        </div>
        <div class="plan-legend-item">
          <div class="plan-legend-dot" style="background:var(--pile-micro)"></div>
          <span>微型桩</span>
        </div>
        <div class="plan-legend-item">
          <div class="plan-legend-dot" style="background:var(--pile-column)"></div>

function generatePerimeterPath(points, startIdx, endIdx) {
  const result = [];
  for (let i = startIdx; i <= endIdx && i < points.length; i++) result.push(points[i]);
  return result;
}
function calcPathLength(points, startIdx, endIdx) {
  let len = 0;
  for (let i = startIdx; i < endIdx && i < points.length; i++) {
    const a = points[i], b = points[Math.min(i+1, points.length-1)];
    len += Math.sqrt((b.x-a.x)**2 + (b.y-a.y)**2);
  }
  return Math.round(len);
}

  const rect = planContainer.getBoundingClientRect();

// ---- Render 基坑轮廓 ----
function renderOutline() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'outlineGroup');

  // 基坑外轮廓（使用冠梁crownBeams[0]的outerPath绘制虚线轮廓）
  const crownBeam = crownBeams && crownBeams.length > 0 ? crownBeams[0] : null;
  if (crownBeam && crownBeam.outerPath.length > 1) {
    const pts = crownBeam.outerPath.map(p => p.x + ',' + p.y).join(' ');
    const outline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    outline.setAttribute('points', pts);
    outline.setAttribute('fill', 'none');
    outline.setAttribute('stroke', '#334155');
    outline.setAttribute('stroke-width', '2');
    outline.setAttribute('stroke-dasharray', '12,6');
    g.appendChild(outline);
  }

  // 基坑标签
  const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  label.setAttribute('x', vbW / 2);
  label.setAttribute('y', 30);
  label.setAttribute('text-anchor', 'middle');
  label.setAttribute('fill', '#475569');
  label.setAttribute('font-size', '12');
  label.textContent = '基坑支护范围';
  g.appendChild(label);

  // 方向标识 N
  const north = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  const nLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  nLine.setAttribute('x1', vbW - 30); nLine.setAttribute('y1', 70); nLine.setAttribute('x2', vbW - 30); nLine.setAttribute('y2', 40);
  nLine.setAttribute('stroke', '#64748b'); nLine.setAttribute('stroke-width', '1.5');
  const nText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  nText.setAttribute('x', vbW - 30); nText.setAttribute('y', '35');
  nText.setAttribute('text-anchor', 'middle');
  nText.setAttribute('fill', '#64748b');
  nText.setAttribute('font-size', '11');
  nText.textContent = 'N';
  north.appendChild(nLine); north.appendChild(nText);
  g.appendChild(north);

  svg.appendChild(g);
}

// ---- Render Box Culverts (箱涵轮廓线) ----
function renderBoxCulverts() {
  if (typeof boxCulverts === 'undefined' || !boxCulverts || boxCulverts.length === 0) return;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'boxCulvertsGroup');

  boxCulverts.forEach(bc => {
    if (bc.path.length < 2) return;
    const pts = bc.path.map(p => `${p.x},${p.y}`).join(' ');
    // Background glow
    const bg = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    bg.setAttribute('points', pts);
    bg.setAttribute('fill', 'none');
    bg.setAttribute('stroke', 'rgba(0,188,212,0.15)');
    bg.setAttribute('stroke-width', '5');
    bg.setAttribute('stroke-linecap', 'round');
    bg.setAttribute('stroke-linejoin', 'round');
    bg.setAttribute('pointer-events', 'none');
    g.appendChild(bg);
    // Foreground line
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    line.setAttribute('points', pts);
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', '#00bcd4');
    line.setAttribute('stroke-width', '2');
    line.setAttribute('stroke-dasharray', '8,4');
    line.setAttribute('stroke-linecap', 'round');
    line.setAttribute('stroke-linejoin', 'round');
    line.setAttribute('opacity', '0.6');
    line.setAttribute('pointer-events', 'stroke');
    line.style.cursor = 'pointer';
    // Hover
    line.addEventListener('mouseenter', (e) => {
      line.setAttribute('opacity', '1');
      line.setAttribute('stroke-width', '3');
      bg.setAttribute('stroke', 'rgba(0,188,212,0.3)');
      bg.setAttribute('stroke-width', '7');
      showSvgTooltip(e, { type: 'boxCulvert', id: bc.id, label: '箱涵轮廓线', points: bc.path.length });
    });
    line.addEventListener('mouseleave', () => {
      line.setAttribute('opacity', '0.6');
      line.setAttribute('stroke-width', '2');
      bg.setAttribute('stroke', 'rgba(0,188,212,0.15)');
      bg.setAttribute('stroke-width', '5');
      hideSvgTooltip();
    });
    g.appendChild(line);
  });

  svg.appendChild(g);
}

// ---- Render Red Line (用地红线) ----
function renderRedLine() {
  if (typeof redLine === 'undefined' || !redLine || redLine.length === 0) return;
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'redLineGroup');

  redLine.forEach(seg => {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', seg.x1);
    line.setAttribute('y1', seg.y1);
    line.setAttribute('x2', seg.x2);
    line.setAttribute('y2', seg.y2);
    line.setAttribute('stroke', '#e53935');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '12,6');
    line.setAttribute('opacity', '0.5');
    line.setAttribute('fill', 'none');
    line.setAttribute('pointer-events', 'none');
    g.appendChild(line);
  });

  svg.appendChild(g);
}

// ---- Render Piles ----
function renderPiles() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'pilesGroup');

  piles.forEach(p => {
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.x);
    circle.setAttribute('cy', p.y);
    circle.setAttribute('r', p.r);
    circle.setAttribute('fill', STATUS_COLORS[p.status]);
    circle.setAttribute('stroke', TYPES[p.type].color);
    circle.setAttribute('stroke-width', '1.5');
    circle.setAttribute('class', 'pile-circle');
    circle.setAttribute('data-id', p.id);
    circle.setAttribute('opacity', p.status === 'pending' ? '0.35' : '0.85');
    circle.addEventListener('click', (e) => {
      if (editMode) return;
      e.stopPropagation();
      showPopup(e, p);
    });
    circle.addEventListener('mouseenter', (e) => {
      if (!editMode) showSvgTooltip(e, { type: 'pile', ...p });
    });
    circle.addEventListener('mouseleave', () => {
      hideSvgTooltip();
    });
    g.appendChild(circle);

    // Column pile cross
    if (p.type === '立柱桩') {
      const cross = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      cross.setAttribute('stroke', '#fff');
      cross.setAttribute('stroke-width', '1');
      cross.setAttribute('opacity', '0.6');
      const l1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l1.setAttribute('x1', p.x-5); l1.setAttribute('y1', p.y); l1.setAttribute('x2', p.x+5); l1.setAttribute('y2', p.y);
      const l2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l2.setAttribute('x1', p.x); l2.setAttribute('y1', p.y-5); l2.setAttribute('x2', p.x); l2.setAttribute('y2', p.y+5);
      cross.appendChild(l1); cross.appendChild(l2);
      g.appendChild(cross);
    }
  });

  svg.appendChild(g);
}

// ---- Render Beams ----
function renderBeams() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'beamsGroup');

  // --- Render crown beams (冠梁) with outer + inner paths ---
  if (typeof crownBeams !== 'undefined' && crownBeams) {
    crownBeams.forEach(cb => {
      const typeColor = TYPES[cb.type] ? TYPES[cb.type].color : '#fdd835';
      const sw = cb.thickness || 3;
      const isMicro = sw < 2.5;

      // Group for this crown beam (enables hover highlight of all parts together)
      const cbGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      cbGroup.setAttribute('data-id', cb.id);
      cbGroup.setAttribute('data-type', 'crown-beam');
      cbGroup.style.cursor = 'pointer';

      // Transparent wide hitarea for easy clicking
      const allPts = [...cb.outerPath, ...cb.innerPath];
      const hitPts = allPts.map(p => `${p.x},${p.y}`).join(' ');
      if (hitPts) {
        const hitarea = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        hitarea.setAttribute('points', hitPts);
        hitarea.setAttribute('fill', 'none');
        hitarea.setAttribute('stroke', 'transparent');
        hitarea.setAttribute('stroke-width', '16');
        hitarea.setAttribute('pointer-events', 'stroke');
        cbGroup.appendChild(hitarea);
      }

      // Draw outer path
      if (cb.outerPath.length >= 2) {
        const pts = cb.outerPath.map(p => `${p.x},${p.y}`).join(' ');
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        bg.setAttribute('points', pts);
        bg.setAttribute('fill', 'none');
        bg.setAttribute('stroke', 'rgba(255,216,53,0.18)');
        bg.setAttribute('stroke-width', String(sw + 4));
        bg.setAttribute('stroke-linecap', 'round');
        bg.setAttribute('pointer-events', 'none');
        bg.setAttribute('class', 'crown-outer-bg');
        cbGroup.appendChild(bg);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        line.setAttribute('points', pts);
        line.setAttribute('fill', 'none');
        line.setAttribute('stroke', typeColor);
        line.setAttribute('stroke-width', String(sw));
        line.setAttribute('opacity', '0.6');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('pointer-events', 'none');
        line.setAttribute('class', 'crown-outer-fg');
        cbGroup.appendChild(line);
      }

      // Draw inner path
      if (cb.innerPath.length >= 2) {
        const pts = cb.innerPath.map(p => `${p.x},${p.y}`).join(' ');
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        bg.setAttribute('points', pts);
        bg.setAttribute('fill', 'none');
        bg.setAttribute('stroke', 'rgba(255,216,53,0.12)');
        bg.setAttribute('stroke-width', String(sw + 2));
        bg.setAttribute('stroke-linecap', 'round');
        bg.setAttribute('pointer-events', 'none');
        bg.setAttribute('class', 'crown-inner-bg');
        cbGroup.appendChild(bg);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        line.setAttribute('points', pts);
        line.setAttribute('fill', 'none');
        line.setAttribute('stroke', typeColor);
        line.setAttribute('stroke-width', String(sw));
        line.setAttribute('opacity', '0.45');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('pointer-events', 'none');
        line.setAttribute('class', 'crown-inner-fg');
        cbGroup.appendChild(line);
      }

      // Draw closure lines (端部封闭线)
      if (cb.closures && cb.closures.length > 0) {
        cb.closures.forEach(cl => {
          const cLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          cLine.setAttribute('x1', cl.x1);
          cLine.setAttribute('y1', cl.y1);
          cLine.setAttribute('x2', cl.x2);
          cLine.setAttribute('y2', cl.y2);
          cLine.setAttribute('stroke', typeColor);
          cLine.setAttribute('stroke-width', String(sw));
          cLine.setAttribute('opacity', '0.5');
          cLine.setAttribute('stroke-linecap', 'round');
          cLine.setAttribute('pointer-events', 'none');
          cLine.setAttribute('class', 'crown-closure');
          cbGroup.appendChild(cLine);
        });
      }

      // Hover: highlight outer + inner + closures together
      cbGroup.addEventListener('mouseenter', (e) => {
        if (editMode) return;
        cbGroup.querySelectorAll('.crown-outer-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.35)');
          el.setAttribute('stroke-width', String(sw + 8));
        });
        cbGroup.querySelectorAll('.crown-outer-fg').forEach(el => {
          el.setAttribute('opacity', '1');
          el.setAttribute('stroke-width', String(sw + 1));
        });
        cbGroup.querySelectorAll('.crown-inner-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.3)');
          el.setAttribute('stroke-width', String(sw + 6));
        });
        cbGroup.querySelectorAll('.crown-inner-fg').forEach(el => {
          el.setAttribute('opacity', '0.85');
          el.setAttribute('stroke-width', String(sw + 1));
        });
        cbGroup.querySelectorAll('.crown-closure').forEach(el => {
          el.setAttribute('opacity', '0.9');
          el.setAttribute('stroke-width', String(sw + 1));
        });
        const label = isMicro ? '微型桩冠梁' : '主冠梁';
        showSvgTooltip(e, { type: 'crown', id: cb.id, label, totalLength: cb.totalLength, thickness: sw });
      });
      cbGroup.addEventListener('mouseleave', () => {
        // Restore original styles
        cbGroup.querySelectorAll('.crown-outer-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.18)');
          el.setAttribute('stroke-width', String(sw + 4));
        });
        cbGroup.querySelectorAll('.crown-outer-fg').forEach(el => {
          el.setAttribute('opacity', '0.6');
          el.setAttribute('stroke-width', String(sw));
        });
        cbGroup.querySelectorAll('.crown-inner-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.12)');
          el.setAttribute('stroke-width', String(sw + 2));
        });
        cbGroup.querySelectorAll('.crown-inner-fg').forEach(el => {
          el.setAttribute('opacity', '0.45');
        });
        cbGroup.querySelectorAll('.crown-closure').forEach(el => {
          el.setAttribute('opacity', '0.5');
          el.setAttribute('stroke-width', String(sw));
        });
        hideSvgTooltip();
      });
      cbGroup.addEventListener('click', (e) => {
        if (editMode) return;
        e.stopPropagation();
        const label = isMicro ? '微型桩冠梁' : '主冠梁';
        showCrownPopup(e, cb, label);
      });

      g.appendChild(cbGroup);
    });
  }

  // --- Render non-crown beams (struts + corner braces) ---
  beams.forEach(beam => {
    if (beam.path.length < 2) return;
    const pts = beam.path.map(p => `${p.x},${p.y}`).join(' ');

    // Determine colors: completed segments use entity color, pending use light gray
    const typeColor = TYPES[beam.type] ? TYPES[beam.type].color : '#60a5fa';

    // Background line (full length, light gray for pending status)
    const bgLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    bgLine.setAttribute('points', pts);
    bgLine.setAttribute('fill', 'none');
    if (beam.type.includes('角撑')) {
      bgLine.setAttribute('stroke', 'rgba(150,160,180,0.06)');
      bgLine.setAttribute('stroke-width', '6');
    } else {
      bgLine.setAttribute('stroke', 'rgba(150,160,180,0.06)');
      bgLine.setAttribute('stroke-width', '7');
    }
    bgLine.setAttribute('stroke-linecap', 'round');
    bgLine.setAttribute('pointer-events', 'none');
    g.appendChild(bgLine);

    // If no segments defined (all pending), draw as entity color with low opacity
    if (beam.segments.length === 0) {
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      line.setAttribute('points', pts);
      line.setAttribute('fill', 'none');
      if (beam.type.includes('角撑')) {
        line.setAttribute('stroke', 'rgba(140,155,175,0.18)');
        line.setAttribute('stroke-width', '3');
      } else {
        line.setAttribute('stroke', 'rgba(140,155,175,0.18)');
        line.setAttribute('stroke-width', '4');
      }
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('class', 'beam-line-drawn');
      line.setAttribute('data-id', beam.id);
      line.addEventListener('click', (e) => {
        if (editMode) return;
        e.stopPropagation();
        showBeamPopup(e, beam, null);
      });
      line.addEventListener('mouseenter', (e) => {
        if (!editMode) showSvgTooltip(e, { type: 'beam', beam, seg: null });
      });
      line.addEventListener('mouseleave', () => {
        hideSvgTooltip();
      });
      g.appendChild(line);
    }

    // Status segments (when defined)
    beam.segments.forEach(seg => {
      if (seg.end <= seg.start) return;
      const segPath = getSubPath(beam.path, seg.start, seg.end);
      if (!segPath || segPath.length < 2) return;

      const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
      const segPts = segPath.map(p => `${p.x},${p.y}`).join(' ');
      line.setAttribute('points', segPts);
      line.setAttribute('fill', 'none');
      // Completed = entity color, pending = light gray
      line.setAttribute('stroke', seg.status === 'done' ? typeColor : STATUS_COLORS[seg.status]);
      line.setAttribute('stroke-width', beam.type.includes('角撑') ? '5' : '6');
      line.setAttribute('stroke-linecap', 'round');
      line.setAttribute('class', 'beam-line-drawn');
      line.setAttribute('data-id', beam.id);
      line.addEventListener('click', (e) => {
        if (editMode) return;
        e.stopPropagation();
        showBeamPopup(e, beam, seg);
      });
      line.addEventListener('mouseenter', (e) => {
        if (!editMode) showSvgTooltip(e, { type: 'beam', beam, seg });
      });
      line.addEventListener('mouseleave', () => {
        hideSvgTooltip();
      });
      g.appendChild(line);
    });

  });

  svg.appendChild(g);
}

function getSubPath(path, startFrac, endFrac) {
  const totalLen = pathLength(path);
  if (totalLen === 0) return path;
  const startDist = totalLen * (startFrac / 100);
  const endDist = totalLen * (endFrac / 100);
  return interpolatePath(path, startDist, endDist);
}

function pathLength(path) {
  let len = 0;
  for (let i = 1; i < path.length; i++) {
    len += Math.sqrt((path[i].x - path[i-1].x)**2 + (path[i].y - path[i-1].y)**2);
  }
  return len;
}

function interpolatePath(path, startDist, endDist) {
  const result = [{ x: path[0].x, y: path[0].y }];
  let accumulated = 0;
  for (let i = 1; i < path.length; i++) {
    const dx = path[i].x - path[i-1].x;
    const dy = path[i].y - path[i-1].y;
    const segLen = Math.sqrt(dx*dx + dy*dy);
    if (accumulated + segLen >= startDist && accumulated < endDist) {
      if (accumulated < startDist) {
        const t = (startDist - accumulated) / segLen;
        result.push({ x: path[i-1].x + dx*t, y: path[i-1].y + dy*t });
      }
      if (accumulated + segLen <= endDist) {
        result.push({ x: path[i].x, y: path[i].y });
      } else {
        const t = (endDist - accumulated) / segLen;
        result.push({ x: path[i-1].x + dx*t, y: path[i-1].y + dy*t });
      }
    }
    accumulated += segLen;
  }
  return result;
}

// ---- Render Slabs ----
function renderSlabs() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'slabsGroup');

  slabs.forEach(slab => {
    // Background polygon (full slab outline)
    const pts = slab.polygon.map(p => `${p.x},${p.y}`).join(' ');
    const bgPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    bgPoly.setAttribute('points', pts);
    bgPoly.setAttribute('fill', STATUS_COLORS[slab.status]);
    bgPoly.setAttribute('stroke', TYPES[slab.type].color);
    bgPoly.setAttribute('stroke-width', '1.5');
    bgPoly.setAttribute('class', 'slab-poly-drawn');
    bgPoly.setAttribute('data-id', slab.id);
    bgPoly.setAttribute('opacity', '0.2');
    bgPoly.addEventListener('click', (e) => {
      if (editMode) return;
      e.stopPropagation();
      showSlabPopup(e, slab);
    });
    bgPoly.addEventListener('mouseenter', (e) => {
      if (!editMode) showSvgTooltip(e, { type: 'slab', slab });
    });
    bgPoly.addEventListener('mouseleave', () => {
      hideSvgTooltip();
    });
    g.appendChild(bgPoly);

    // Render sub-regions (if any)
    if (slab.regions && slab.regions.length > 0) {
      slab.regions.forEach((region, rIdx) => {
        const rPts = region.polygon.map(p => `${p.x},${p.y}`).join(' ');
        const rPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        rPoly.setAttribute('points', rPts);
        rPoly.setAttribute('fill', STATUS_COLORS[region.status]);
        rPoly.setAttribute('stroke', '#fff');
        rPoly.setAttribute('stroke-width', '1');
        rPoly.setAttribute('class', 'slab-region-drawn');
        rPoly.setAttribute('data-id', slab.id + '-r' + rIdx);
        rPoly.setAttribute('opacity', '0.5');
        rPoly.addEventListener('click', (e) => {
          e.stopPropagation();
          showSlabRegionPopup(e, slab, region);
        });
        rPoly.addEventListener('mouseenter', (e) => {
          if (!editMode) showSvgTooltip(e, { type: 'slabRegion', slab, region });
        });
        rPoly.addEventListener('mouseleave', () => {
          hideSvgTooltip();
        });
        g.appendChild(rPoly);
      });
    }

    // Area label + ID label
    const centroid = polygonCentroid(slab.polygon);
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('x', centroid.x);
    text.setAttribute('y', centroid.y);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('fill', '#fff');
    text.setAttribute('font-size', '10');
    text.textContent = `${slab.area}m\u00B2`;
    g.appendChild(text);

    const idText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    idText.setAttribute('x', centroid.x);
    idText.setAttribute('y', centroid.y + 13);
    idText.setAttribute('text-anchor', 'middle');
    idText.setAttribute('fill', '#fff');
    idText.setAttribute('font-size', '9');
    idText.setAttribute('opacity', '0.7');
    idText.setAttribute('pointer-events', 'none');
    idText.textContent = slab.id;
    g.appendChild(idText);
  });

  svg.appendChild(g);
}

function polygonCentroid(pts) {
  const n = pts.length;
  const cx = pts.reduce((s, p) => s + p.x, 0) / n;
  const cy = pts.reduce((s, p) => s + p.y, 0) / n;
  return { x: cx, y: cy };
}

function setStatus(status) {
  if (!currentTarget) return;
  if (currentTarget.type === 'beamSeg') {
    const oldStatus = currentTarget.seg.status;
    currentTarget.seg.status = status;
    undoStack.push({ action: 'changeSegStatus', beamId: currentTarget.beam.id, seg: currentTarget.seg, oldStatus });
  } else if (currentTarget.type === 'slabRegion') {
    const slab = currentTarget.slab;
    const oldStatus = currentTarget.region.status;
    currentTarget.region.status = status;
    const idx = slab.regions.indexOf(currentTarget.region);
    undoStack.push({ action: 'changeRegionStatus', slabId: slab.id, regionIdx: idx, oldStatus });
  } else if (currentTarget.type === 'slab') {
    currentTarget.slab.status = status;
  } else {
    currentTarget.status = status;
  }
  document.getElementById('statusPopup').classList.remove('active');
  document.getElementById('popupDeleteSegBtn').style.display = 'none';
  currentTarget = null;
  refresh();
}

function calcStats() {
  const stats = {};
  Object.keys(TYPES).forEach(type => {
    if (TYPES[type].category === 'pile') {
      const items = piles.filter(p => p.type === type);
      stats[type] = {
        total: items.length,
        done: items.filter(p => p.status === 'done').length,
        doing: items.filter(p => p.status === 'doing').length,
        pending: items.filter(p => p.status === 'pending').length,
        unit: TYPES[type].unit
      };
    } else if (TYPES[type].category === 'beam') {
      const items = beams.filter(b => b.type === type);
      let totalLen = 0, doneLen = 0, doingLen = 0;
      items.forEach(b => {
        totalLen += b.totalLength;
        b.segments.forEach(s => {
          const segLen = b.totalLength * (s.end - s.start) / 100;
          if (s.status === 'done') doneLen += segLen;
          else if (s.status === 'doing') doingLen += segLen;
        });
      });
      stats[type] = { total: Math.round(totalLen), done: Math.round(doneLen), doing: Math.round(doingLen), pending: Math.round(totalLen - doneLen - doingLen), unit: TYPES[type].unit };
    } else if (TYPES[type].category === 'slab') {
      const items = slabs.filter(s => s.type === type);
      const total = items.reduce((s, sl) => s + sl.area, 0);
      const done = items.filter(s => s.status === 'done').reduce((s, sl) => s + sl.area, 0);
      const doing = items.filter(s => s.status === 'doing').reduce((s, sl) => s + sl.area, 0);
      stats[type] = { total, done, doing, pending: total - done - doing, unit: TYPES[type].unit };
    }
  });
  return stats;
}

function renderPieChart() {
  const stats = calcStats();

  Object.keys(stats).forEach(type => {
    if (stats[type].done > 0) {

      values.push(stats[type].done);
      labels.push(type);

  });

  const total = values.reduce((s, v) => s + v, 0);
  let gradient = 'conic-gradient(';
  let cumulative = 0;
  values.forEach((v, i) => {

    gradient += `${colors[i]} ${cumulative}% ${cumulative + pct}%`;
    cumulative += pct;
    if (i < values.length - 1) gradient += ', ';
  });
  gradient += ')';

  document.getElementById('pieChart').style.background = gradient;
  document.getElementById('pieTotalRate').textContent = Math.round(total / Math.max(Object.values(stats).reduce((s,a) => s+a.total, 0), 1) * 100) + '%';

// ============================================================
// ZOOM & PAN (via viewBox)
// ============================================================

let vbX = 0, vbY = 0, vbW = 1400, vbH = 900;
let isPanning = false, hasDragged = false, panStartX, panStartY, vbStartX, vbStartY;

function setupZoom() {
  const container = document.getElementById('planContainer');
  updateViewBox();

  container.addEventListener('mousedown', (e) => {
    if (drawingMode) return;
    // Don't start pan if clicking on an interactive element (pile, beam, etc.)
    if (e.target.closest('[data-id]') || e.target.closest('[data-type]')) return;
    isPanning = true;
    hasDragged = false;
    panStartX = e.clientX;
    panStartY = e.clientY;
    vbStartX = vbX;
    vbStartY = vbY;
    container.style.cursor = 'grabbing';
  });
  container.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    if (!hasDragged && Math.sqrt(dx*dx + dy*dy) < 5) return; // Wait for threshold
    hasDragged = true;
    const rect = container.getBoundingClientRect();
    const scaleX = vbW / rect.width;
    const scaleY = vbH / rect.height;
    vbX = vbStartX - dx * scaleX;
    vbY = vbStartY - dy * scaleY;
    updateViewBox();
  });
  container.addEventListener('mouseup', () => {
    isPanning = false;
    container.style.cursor = '';
  });
  container.addEventListener('mouseleave', () => {
    isPanning = false;
    container.style.cursor = '';
  });
  // Prevent click after drag
  container.addEventListener('click', (e) => {
    if (hasDragged) {
      e.stopPropagation();
      hasDragged = false;
    }
  }, true);
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = container.getBoundingClientRect();
    const mx = (e.clientX - rect.left) / rect.width * vbW + vbX;
    const my = (e.clientY - rect.top) / rect.height * vbH + vbY;
    const factor = e.deltaY > 0 ? 1.2 : 0.8;
    vbW = Math.min(1800, Math.max(100, vbW * factor));
    vbH = Math.min(1200, Math.max(67, vbH * factor));
    vbX = mx - (mx - vbX) * factor;
    vbY = my - (my - vbY) * factor;
    updateViewBox();
  }, { passive: false });
}

function updateViewBox() {
  svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
}

function zoomIn() {
  const cx = vbX + vbW / 2, cy = vbY + vbH / 2;
  vbW = Math.max(100, vbW * 0.8);
  vbH = Math.max(67, vbH * 0.8);
  vbX = cx - vbW / 2;
  vbY = cy - vbH / 2;
  updateViewBox();
}
function zoomOut() {
  const cx = vbX + vbW / 2, cy = vbY + vbH / 2;
  vbW = Math.min(1800, vbW * 1.2);
  vbH = Math.min(1200, vbH * 1.2);
  vbX = cx - vbW / 2;
  vbY = cy - vbH / 2;
  updateViewBox();
}
function resetView() { vbX = 0; vbY = 0; vbW = 1400; vbH = 900; updateViewBox(); }

// ---- Find nearest point on beam path ----
function findNearestPercentOnPath(path, pt) {
  let bestDist = Infinity, bestFrac = 0;
  let accumulated = 0;
  for (let i = 1; i < path.length; i++) {
    const a = path[i - 1], b = path[i];
    const dx = b.x - a.x, dy = b.y - a.y;
    const segLen = Math.sqrt(dx * dx + dy * dy);
    if (segLen < 0.01) continue;
    // Project point onto segment
    const t = Math.max(0, Math.min(1, ((pt.x - a.x) * dx + (pt.y - a.y) * dy) / (segLen * segLen)));
    const px = a.x + dx * t, py = a.y + dy * t;
    const dist = Math.sqrt((pt.x - px) ** 2 + (pt.y - py) ** 2);
    const frac = (accumulated + t * segLen) / pathLength(path) * 100;
    if (dist < bestDist) {
      bestDist = dist;
      bestFrac = frac;
    }
    accumulated += segLen;
  }
  return { frac: bestFrac, dist: bestDist };
}

// ---- Find which beam was clicked (proximity test) ----
function findBeamAtPoint(svgPt, threshold) {
  threshold = threshold || 12; // pixels in SVG coords
  let best = null, bestDist = Infinity;
  beams.forEach(beam => {
    const result = findNearestPercentOnPath(beam.path, svgPt);
    if (result.dist < bestDist) {
      bestDist = result.dist;
      best = { beam, percent: result.frac, dist: result.dist };
    }
  });
  if (best && best.dist <= threshold) return best;
  return null;
}

// ---- Find which slab was clicked ----
function findSlabAtPoint(svgPt) {
  for (const slab of slabs) {
    if (pointInPolygon(svgPt, slab.polygon)) return slab;
  }
  return null;
}

function pointInPolygon(pt, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    if (((yi > pt.y) !== (yj > pt.y)) && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ---- Setup editing events ----
function setupEditingEvents() {
  const svgEl = document.getElementById('planSvg');

  // Click on SVG for editing
  svgEl.addEventListener('click', (e) => {
    if (!editMode) return;
    // Don't intercept clicks on pile circles or status popup
    if (e.target.closest('.pile-circle') || e.target.closest('.status-popup')) return;

    const pt = screenToSvg(e.clientX, e.clientY);

    if (editMode === 'beam') {
      handleBeamEditClick(pt, e);
    } else if (editMode === 'slab') {
      handleSlabEditClick(pt, e);
    }
  });

  // Mouse move for preview
  svgEl.addEventListener('mousemove', (e) => {
    if (!editMode) return;
    const pt = screenToSvg(e.clientX, e.clientY);

    if (editMode === 'beam' && editingTarget && editingBeamStart !== null) {
      // Preview beam segment
      clearPreview();
      const g = document.getElementById('drawPreview');
      const startPct = editingBeamStart;
      const endResult = findNearestPercentOnPath(editingTarget.path, pt);
      const minPct = Math.min(startPct, endResult.frac);
      const maxPct = Math.max(startPct, endResult.frac);
      const segPath = getSubPath(editingTarget.path, minPct, maxPct);
      if (segPath && segPath.length >= 2) {
        const previewLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        const pts = segPath.map(p => `${p.x},${p.y}`).join(' ');
        previewLine.setAttribute('points', pts);
        previewLine.setAttribute('fill', 'none');
        previewLine.setAttribute('stroke', '#60a5fa');
        previewLine.setAttribute('stroke-width', '8');
        previewLine.setAttribute('stroke-linecap', 'round');
        previewLine.setAttribute('opacity', '0.6');
        previewLine.setAttribute('stroke-dasharray', '6,4');
        g.appendChild(previewLine);

        // Show length preview
        const segLen = Math.round(editingTarget.totalLength * (maxPct - minPct) / 100);
        const midPath = segPath[Math.floor(segPath.length / 2)];
        const lenText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        lenText.setAttribute('x', midPath.x);
        lenText.setAttribute('y', midPath.y - 10);
        lenText.setAttribute('text-anchor', 'middle');
        lenText.setAttribute('fill', '#60a5fa');
        lenText.setAttribute('font-size', '11');
        lenText.setAttribute('pointer-events', 'none');
        lenText.textContent = segLen + 'm (' + Math.round(minPct) + '%-' + Math.round(maxPct) + '%)';
        g.appendChild(lenText);
      }
    } else if (editMode === 'slab' && editingTarget && slabEditPoints.length > 0) {
      // Preview slab sub-region polygon
      clearPreview();
      const g = document.getElementById('drawPreview');
      const allPts = [...slabEditPoints, pt];
      const ptsStr = allPts.map(p => `${p.x},${p.y}`).join(' ');

      const previewPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      previewPoly.setAttribute('points', ptsStr);
      previewPoly.setAttribute('fill', '#60a5fa');
      previewPoly.setAttribute('opacity', '0.2');
      previewPoly.setAttribute('stroke', '#60a5fa');
      previewPoly.setAttribute('stroke-width', '2');
      previewPoly.setAttribute('stroke-dasharray', '4,3');
      previewPoly.setAttribute('pointer-events', 'none');
      g.appendChild(previewPoly);

      // Vertex markers
      slabEditPoints.forEach(p => {
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        marker.setAttribute('cx', p.x);
        marker.setAttribute('cy', p.y);
        marker.setAttribute('r', '4');
        marker.setAttribute('fill', '#60a5fa');
        marker.setAttribute('opacity', '0.9');
        marker.setAttribute('pointer-events', 'none');
        g.appendChild(marker);
      });
    }
  });

  // Double click for slab region closing
  svgEl.addEventListener('dblclick', (e) => {
    if (editMode === 'slab' && editingTarget && slabEditPoints.length >= 3) {
      e.preventDefault();
      e.stopPropagation();
      finishSlabRegion();
    }
  });

  // Right click to cancel current edit or exit edit mode
  planContainer.addEventListener('contextmenu', (e) => {
    if (editMode) {
      e.preventDefault();
      if (editMode === 'beam' && editingBeamStart !== null) {
        // Cancel current segment marking
        editingBeamStart = null;
        clearPreview();
        updateModeIndicator('标记梁段：点击梁上的位置设置起点');
      } else if (editMode === 'slab' && slabEditPoints.length > 0) {
        // Cancel current sub-region drawing
        slabEditPoints = [];
        clearPreview();
        updateModeIndicator('标记板区：在盖板内点击添加顶点（双击闭合）');
      } else {
        cancelEditing();
      }
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      cancelEditing();
    }
    if (e.key === 'Enter' && editMode === 'slab' && editingTarget && slabEditPoints.length >= 3) {
      finishSlabRegion();
    }
    if (e.ctrlKey && e.key === 'z') {
      e.preventDefault();
      undoLastEdit();
    }
  });
}

// ---- Handle beam edit click ----
function handleBeamEditClick(pt, e) {
  const hit = findBeamAtPoint(pt);
  if (!hit) {
    // Clicked outside beams - deselect current
    if (editingTarget) {
      editingTarget = null;
      editingBeamStart = null;
      clearPreview();
      clearEditingHighlights();
      updateModeIndicator('标记梁段：点击一条梁进入编辑');
    }
    return;
  }

  const beam = hit.beam;
  const percent = hit.percent;

  if (!editingTarget || editingTarget.id !== beam.id) {
    // Selecting a new beam
    editingTarget = beam;
    editingBeamStart = null;
    clearPreview();
    clearEditingHighlights();
    // Add editing highlight (thicker dashed outline)
    highlightBeam(beam);
    updateModeIndicator(`标记梁段：${beam.id} - 点击梁上的位置设置起点`);
    return;
  }

  if (editingBeamStart === null) {
    // Set start point
    editingBeamStart = percent;
    // Mark start point visually
    clearPreview();
    const g = document.getElementById('drawPreview');
    const startPtOnPath = getPointAtPercent(beam.path, percent);
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    marker.setAttribute('cx', startPtOnPath.x);
    marker.setAttribute('cy', startPtOnPath.y);
    marker.setAttribute('r', '5');
    marker.setAttribute('fill', '#60a5fa');
    marker.setAttribute('opacity', '0.9');
    marker.setAttribute('pointer-events', 'none');
    g.appendChild(marker);
    updateModeIndicator(`标记梁段：${beam.id} - 起点已设(${Math.round(percent)}%)，点击终点位置`);
  } else {
    // Set end point - create segment
    const startPct = Math.min(editingBeamStart, percent);
    const endPct = Math.max(editingBeamStart, percent);
    if (endPct - startPct < 1) {
      // Too short, treat as new start
      editingBeamStart = percent;
      clearPreview();
      const g = document.getElementById('drawPreview');
      const startPtOnPath = getPointAtPercent(beam.path, percent);
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      marker.setAttribute('cx', startPtOnPath.x);
      marker.setAttribute('cy', startPtOnPath.y);
      marker.setAttribute('r', '5');
      marker.setAttribute('fill', '#60a5fa');
      marker.setAttribute('opacity', '0.9');
      marker.setAttribute('pointer-events', 'none');
      g.appendChild(marker);
      return;
    }

    // Create new segment - show status popup
    const newSeg = { start: Math.round(startPct), end: Math.round(endPct), status: 'doing' };
    beam.segments.push(newSeg);
    // Compact overlapping segments
    compactBeamSegments(beam);

    clearPreview();
    editingBeamStart = null;
    undoStack.push({ action: 'addSeg', beamId: beam.id });
    refresh();
    highlightBeam(beam);
    updateModeIndicator(`标记梁段：${beam.id} - 段已添加，继续点击或退出`);

    // Show popup for the new segment to set status
    const midPercent = (newSeg.start + newSeg.end) / 2;
    const midPt = getPointAtPercent(beam.path, midPercent);
    const rect = planContainer.getBoundingClientRect();
    const fakeEvent = {
      clientX: rect.left + midPt.x / vbW * rect.width,
      clientY: rect.top + midPt.y / vbH * rect.height,
      stopPropagation: () => {}
    };
    showBeamSegmentPopup(fakeEvent, beam, newSeg);
  }
}

// ---- Get a point at a given percentage along a path ----
function getPointAtPercent(path, pct) {
  const total = pathLength(path);
  const targetDist = total * (pct / 100);
  let accumulated = 0;
  for (let i = 1; i < path.length; i++) {
    const a = path[i - 1], b = path[i];
    const dx = b.x - a.x, dy = b.y - a.y;
    const segLen = Math.sqrt(dx * dx + dy * dy);
    if (accumulated + segLen >= targetDist && segLen > 0) {
      const t = (targetDist - accumulated) / segLen;
      return { x: a.x + dx * t, y: a.y + dy * t };
    }
    accumulated += segLen;
  }
  return path[path.length - 1];
}

// ---- Compact overlapping segments ----
function compactBeamSegments(beam) {
  // Sort segments by start
  beam.segments.sort((a, b) => a.start - b.start);
  // Merge overlapping segments with same status
  const merged = [];
  let i = 0;
  while (i < beam.segments.length) {
    let cur = { ...beam.segments[i] };
    while (i + 1 < beam.segments.length && beam.segments[i + 1].start <= cur.end && beam.segments[i + 1].status === cur.status) {
      cur.end = Math.max(cur.end, beam.segments[i + 1].end);
      i++;
    }
    merged.push(cur);
    i++;
  }
  beam.segments = merged;
}

// ---- Highlight beam in edit mode ----
function highlightBeam(beam) {
  clearEditingHighlights();
  const g = document.getElementById('beamsGroup');
  if (!g) return;
  const hl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  const pts = beam.path.map(p => `${p.x},${p.y}`).join(' ');
  hl.setAttribute('points', pts);
  hl.setAttribute('fill', 'none');
  hl.setAttribute('stroke', '#60a5fa');
  hl.setAttribute('stroke-width', '10');
  hl.setAttribute('opacity', '0.25');
  hl.setAttribute('class', 'beam-editing-highlight');
  hl.setAttribute('pointer-events', 'none');
  g.appendChild(hl);
}

// ---- Handle slab edit click ----
function handleSlabEditClick(pt, e) {
  const hit = findSlabAtPoint(pt);
  if (!hit) {
    if (editingTarget) {
      editingTarget = null;
      slabEditPoints = [];
      clearPreview();
      clearEditingHighlights();
      updateModeIndicator('标记板区：点击一块盖板进入编辑');
    }
    return;
  }

  const slab = hit;

  if (!editingTarget || editingTarget.id !== slab.id) {
    // Select a new slab
    editingTarget = slab;
    slabEditPoints = [];
    clearPreview();
    clearEditingHighlights();
    highlightSlab(slab);
    updateModeIndicator(`标记板区：${slab.id} - 在盖板内点击添加顶点（双击闭合）`);
    return;
  }

  // Check that the point is inside the slab
  if (!pointInPolygon(pt, slab.polygon)) {
    return;
  }

  // Add vertex
  slabEditPoints.push(pt);
  const n = slabEditPoints.length;
  if (n < 3) {
    updateModeIndicator(`标记板区：${slab.id} - 已标记${n}个点，继续点击`);
  } else {
    updateModeIndicator(`标记板区：${slab.id} - 已标记${n}个点，双击或Enter闭合`);
  }
}

// ---- Finish slab sub-region ----
function finishSlabRegion() {
  if (!editingTarget || slabEditPoints.length < 3) return;

  const slab = editingTarget;
  const newRegion = {
    polygon: [...slabEditPoints],
    status: 'doing'
  };

  if (!slab.regions) slab.regions = [];
  slab.regions.push(newRegion);
  undoStack.push({ action: 'addRegion', slabId: slab.id });

  slabEditPoints = [];
  clearPreview();
  refresh();
  highlightSlab(slab);
  updateModeIndicator(`标记板区：${slab.id} - 区域已添加，继续标记或退出`);

  // Show popup for the new region
  const centroid = polygonCentroid(newRegion.polygon);
  const rect = planContainer.getBoundingClientRect();
  const fakeEvent = {
    clientX: rect.left + centroid.x / vbW * rect.width,
    clientY: rect.top + centroid.y / vbH * rect.height,
    stopPropagation: () => {}
  };
  showSlabRegionPopup(fakeEvent, slab, newRegion);
}

// ---- Highlight slab in edit mode ----
function highlightSlab(slab) {
  clearEditingHighlights();
  const g = document.getElementById('slabsGroup');
  if (!g) return;
  const pts = slab.polygon.map(p => `${p.x},${p.y}`).join(' ');
  const hl = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  hl.setAttribute('points', pts);
  hl.setAttribute('fill', 'none');
  hl.setAttribute('stroke', '#60a5fa');
  hl.setAttribute('stroke-width', '3');
  hl.setAttribute('stroke-dasharray', '6,3');
  hl.setAttribute('opacity', '0.6');
  hl.setAttribute('class', 'slab-editing-highlight');
  hl.setAttribute('pointer-events', 'none');
  g.appendChild(hl);
}

// ---- Undo last edit action ----
function undoLastEdit() {
  if (undoStack.length === 0) return;
  const action = undoStack.pop();
  if (action.action === 'addSeg') {
    const beam = beams.find(b => b.id === action.beamId);
    if (beam && beam.segments.length > 0) {
      beam.segments.pop();
    }
  } else if (action.action === 'removeSeg') {
    const beam = beams.find(b => b.id === action.beamId);
    if (beam) {
      beam.segments.push(action.seg);
    }
  } else if (action.action === 'addRegion') {
    const slab = slabs.find(s => s.id === action.slabId);
    if (slab && slab.regions && slab.regions.length > 0) {
      slab.regions.pop();
    }
  } else if (action.action === 'removeRegion') {
    const slab = slabs.find(s => s.id === action.slabId);
    if (slab && slab.regions) {
      slab.regions.push(action.region);
    }
  } else if (action.action === 'changeSegStatus') {
    const beam = beams.find(b => b.id === action.beamId);
    if (beam) {
      const seg = beam.segments.find(s => s.start === action.seg.start && s.end === action.seg.end);
      if (seg) seg.status = action.oldStatus;
    }
  } else if (action.action === 'changeRegionStatus') {
    const slab = slabs.find(s => s.id === action.slabId);
    if (slab && slab.regions) {
      const region = slab.regions[action.regionIdx];
      if (region) region.status = action.oldStatus;
    }
  }
  refresh();
}

// ---- Delete current segment/region ----
function deleteSegment() {
  if (!currentTarget) return;
  if (currentTarget.type === 'beamSeg') {
    const beam = currentTarget.beam;
    const seg = currentTarget.seg;
    const idx = beam.segments.indexOf(seg);
    if (idx >= 0) {
      beam.segments.splice(idx, 1);
      undoStack.push({ action: 'removeSeg', beamId: beam.id, seg });
    }
  } else if (currentTarget.type === 'slabRegion') {
    const slab = currentTarget.slab;
    const region = currentTarget.region;
    const idx = slab.regions.indexOf(region);
    if (idx >= 0) {
      slab.regions.splice(idx, 1);
      undoStack.push({ action: 'removeRegion', slabId: slab.id, region });
    }
  }
  document.getElementById('statusPopup').classList.remove('active');
  document.getElementById('popupDeleteSegBtn').style.display = 'none';
  currentTarget = null;
  refresh();
}

// ---- Tooltip ----
function showSvgTooltip(e, data) {
  const tooltip = document.getElementById('svgTooltip');
  let html = '';
  if (data.type === 'pile') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.type}</span></div>
      <div class="tt-row"><span class="tt-label">状态:</span><span class="tt-val">${STATUS_LABELS[data.status]}</span></div>
    `;
  } else if (data.type === 'beam') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.beam.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.beam.type}</span></div>
      <div class="tt-row"><span class="tt-label">长度:</span><span class="tt-val">${data.beam.totalLength}m</span></div>
      <div class="tt-row"><span class="tt-label">段状态:</span><span class="tt-val">${STATUS_LABELS[data.seg.status]}</span></div>
    `;
  } else if (data.type === 'slab') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.slab.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.slab.type}</span></div>
      <div class="tt-row"><span class="tt-label">面积:</span><span class="tt-val">${data.slab.area}m\u00B2</span></div>
      <div class="tt-row"><span class="tt-label">状态:</span><span class="tt-val">${STATUS_LABELS[data.slab.status]}</span></div>
    `;
  } else if (data.type === 'slabRegion') {
    html = `
      <div class="tt-row"><span class="tt-label">板ID:</span><span class="tt-val">${data.slab.id}</span></div>
      <div class="tt-row"><span class="tt-label">子区域:</span><span class="tt-val">区域 #${data.slab.regions.indexOf(data.region) + 1}</span></div>
      <div class="tt-row"><span class="tt-label">状态:</span><span class="tt-val">${STATUS_LABELS[data.region.status]}</span></div>
    `;
  } else if (data.type === 'crown') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.label}</span></div>
      <div class="tt-row"><span class="tt-label">总长:</span><span class="tt-val">${data.totalLength}m</span></div>
    `;
  } else if (data.type === 'boxCulvert') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.label}</span></div>
      <div class="tt-row"><span class="tt-label">节点数:</span><span class="tt-val">${data.points}</span></div>
    `;
  }
  tooltip.innerHTML = html;
  const container = document.getElementById('planContainer');
  const rect = container.getBoundingClientRect();
  tooltip.style.left = (e.clientX - rect.left + 12) + 'px';
  tooltip.style.top = (e.clientY - rect.top - 10) + 'px';
  tooltip.classList.add('active');
}

function hideSvgTooltip() {
  document.getElementById('svgTooltip').classList.remove('active');
}

// ============================================================
// PANEL TOGGLE
// ============================================================

function togglePanel(side) {
  const panel = document.getElementById(side === 'left' ? 'leftPanel' : 'rightPanel');
  const btn = document.getElementById(side === 'left' ? 'toggleLeft' : 'toggleRight');
  const isCollapsed = panel.classList.toggle('collapsed');
  btn.textContent = side === 'left' ? (isCollapsed ? '❯' : '❮') : (isCollapsed ? '❮' : '❯');
  // Re-center the SVG view after panel toggle
  setTimeout(() => resetView(), 350);
}

// Auto-collapse panels on narrow screens
function checkViewportWidth() {
  const w = window.innerWidth;
  const leftPanel = document.getElementById('leftPanel');
  const rightPanel = document.getElementById('rightPanel');
  const toggleLeft = document.getElementById('toggleLeft');
  const toggleRight = document.getElementById('toggleRight');
  if (w < 1000) {
    if (!leftPanel.classList.contains('collapsed')) {
      leftPanel.classList.add('collapsed');
      toggleLeft.textContent = '❯';
    }
    if (!rightPanel.classList.contains('collapsed')) {
      rightPanel.classList.add('collapsed');
      toggleRight.textContent = '❮';
    }
  } else if (w < 1400) {
    // Collapse right panel only
    if (!rightPanel.classList.contains('collapsed')) {
      rightPanel.classList.add('collapsed');
      toggleRight.textContent = '❮';
    }
  }
}
window.addEventListener('resize', () => {
  checkViewportWidth();
  resetView();
});
// Run on init
setTimeout(() => { checkViewportWidth(); resetView(); }, 100);

// ============================================================
// INIT
// ============================================================

init();
</script>
