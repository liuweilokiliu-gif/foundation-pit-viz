<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/clipper-lib@6.4.2/clipper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7/dist/umd/supabase.min.js"></script>
<title>梅林公安街东侧地块项目基坑支护、土石方及桩基工程</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg-primary: #0a0e1a;
  --bg-secondary: #111827;
  --bg-panel: #1a2235;
  --bg-card: #1e293b;
  --border: #2d3a4f;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #3b82f6;
  --accent-light: #60a5fa;
  --status-done: #00c853;
  --status-doing: #ffab00;
  --status-pending: #546e7a;
  --pile-reinforced: #42a5f5;
  --pile-plain: #bbdefb;
  --pile-jetgrout: #ce93d8;
  --pile-micro: #ffcc80;
  --pile-column: #66bb6a;
  --beam-crown: #fdd835;
  --beam-strut: #ef5350;
  --beam-corner: #ff7043;
  --slab: #4db6ac;
}

/* ===== Reset & Base ===== */
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, 'Microsoft YaHei', 'PingFang SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== Top Header ===== */
.header {
  height: 56px;
  background: linear-gradient(135deg, var(--bg-secondary), var(--bg-panel));
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 20px;
  flex-shrink: 0;
  position: relative;
}
.header-title {
  font-size: 20px;
  font-weight: 700;
  color: var(--accent-light);
  letter-spacing: 2px;
  white-space: nowrap;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.header-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
  flex-wrap: nowrap;
  overflow: hidden;
}
.header-controls label {
  font-size: 13px;
  color: var(--text-secondary);
}
.date-input {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
}
.filter-select {
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
}
.auth-btn {
  padding: 4px 12px;
  border-radius: 4px;
  border: 1px solid var(--accent);
  background: transparent;
  color: var(--accent);
  cursor: pointer;
  font-size: 12px;
  margin-left: auto;
  transition: background 0.2s;
}
.auth-btn:hover {
  background: var(--accent);
  color: var(--bg-primary);
}
.auth-user {
  color: var(--text-secondary);
  font-size: 12px;
  margin-left: 8px;
}
.btn {
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.2s;
}
.btn:hover { background: var(--accent-light); }
.btn-outline {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
}
.btn-outline:hover {
  background: var(--accent);
  color: #fff;
}

/* ===== Main Layout ===== */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ===== Panel Toggle Buttons ===== */
.panel-toggle {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 20px;
  height: 48px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 20;
  transition: background 0.2s;
}
.panel-toggle:hover { background: var(--accent); color: #fff; }
.toggle-left {
  left: 0;
  border-radius: 0 6px 6px 0;
  border-left: none;
}
.toggle-right {
  right: 0;
  border-radius: 6px 0 0 6px;
  border-right: none;
}

/* ===== Side Panels ===== */
.panel {
  width: 320px;
  background: var(--bg-secondary);
  border-right: none;
  padding: 16px;
  overflow-y: auto;
  overflow-x: hidden;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 16px;
  transition: min-width 0.3s ease, padding 0.3s ease, opacity 0.3s ease;
  contain: layout;
}
.panel-resize-handle {
  width: 4px;
  background: transparent;
  cursor: ew-resize;
  flex-shrink: 0;
  position: relative;
  z-index: 20;
  transition: background 0.2s;
}
.panel-resize-handle:hover,
.panel-resize-handle.active {
  background: var(--accent);
  opacity: 0.5;
}
.panel.collapsed {
  width: 0;
  min-width: 0;
  padding: 0;
  overflow: hidden;
  opacity: 0;
}
.panel-right {
  border-right: none;
  border-left: 1px solid var(--border);
}
.panel-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-secondary);
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ===== Chart Cards ===== */
.chart-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 16px;
}
.chart-card-title {
  font-size: 13px;
  color: var(--text-secondary);
  margin-bottom: 12px;
  font-weight: 600;
}

/* ===== Plan Management ===== */
.plan-tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 12px;
}
.plan-tab {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 6px 0;
  border-radius: 6px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.plan-tab.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.plan-period-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  padding: 0 4px;
}
.period-nav {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  width: 28px;
  height: 28px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
}
.period-nav:hover {
  background: var(--border);
}
.period-label {
  font-size: 12px;
  color: var(--text-main);
  font-weight: 500;
}
.plan-table input {
  width: 50px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-main);
  padding: 3px 6px;
  font-size: 12px;
  text-align: center;
}
.plan-table input:focus {
  outline: none;
  border-color: var(--accent);
}
.plan-summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.plan-summary-row:last-child {
  border-bottom: none;
}
.plan-summary-val {
  font-weight: 600;
}

/* ===== Header Progress Bar ===== */
.header-progress {
  display: flex;
  gap: 16px;
  padding: 8px 20px;
  background: rgba(0,0,0,0.3);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
}
.hp-item {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
  font-size: 12px;
}
.hp-label { color: var(--text-secondary); white-space: nowrap; }
.hp-bar-wrap {
  width: 80px;
  height: 8px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
}
.hp-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.4s;
}
.hp-text { color: var(--text-main); font-weight: 600; white-space: nowrap; min-width: 60px; }

/* ===== Plan Collapse ===== */
.plan-collapse-header {
  display: flex;
  align-items: center;
  padding: 8px 0;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
  user-select: none;
}
.plan-collapse-header:hover { color: var(--text-main); }
.plan-collapse-header .collapsed::before { content: '▶ '; }
.plan-collapse-header .expanded::before { content: '▼ '; }

/* ===== Plan vs Actual Rows ===== */
.pva-row {
  display: flex;
  align-items: center;
  padding: 5px 0;
  font-size: 12px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.pva-row:last-child { border-bottom: none; }
.pva-label { width: 80px; color: var(--text-secondary); flex-shrink: 0; }
.pva-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.pva-bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
}
.pva-bar-label { width: 24px; color: var(--text-muted); font-size: 11px; flex-shrink: 0; }
.pva-bar-wrap {
  flex: 1;
  height: 10px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.pva-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
.pva-bar-val { width: 36px; text-align: right; font-size: 11px; color: var(--text-main); flex-shrink: 0; }
.pva-rate {
  width: 48px;
  text-align: right;
  font-weight: 600;
  font-size: 12px;
  flex-shrink: 0;
}

/* ===== Target Input ===== */
.target-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.target-row:last-child { border-bottom: none; }
.target-row input {
  width: 60px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-main);
  padding: 3px 6px;
  font-size: 12px;
  text-align: center;
}
.target-row input:focus { outline: none; border-color: var(--accent); }

/* ===== Overall Progress ===== */
.overall-progress {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.op-percent {
  font-size: 22px;
  font-weight: 800;
  color: var(--accent);
  min-width: 52px;
  text-align: right;
}
.op-bar-wrap {
  flex: 1;
  height: 10px;
  background: rgba(255,255,255,0.06);
  border-radius: 5px;
  overflow: hidden;
}
.op-bar-fill {
  height: 100%;
  border-radius: 5px;
  background: linear-gradient(90deg, var(--accent), #4fc3f7);
  transition: width 0.4s;
}
.op-label {
  font-size: 11px;
  color: var(--text-muted);
}

/* ===== Progress List (Hierarchical) ===== */
.progress-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 12px;
  color: var(--text-primary);
}
.progress-group {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.progress-group-header {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  cursor: pointer;
  gap: 8px;
  user-select: none;
  transition: background 0.2s;
}
.progress-group-header:hover {
  background: rgba(255,255,255,0.03);
}
.progress-group-arrow {
  font-size: 10px;
  color: var(--text-muted);
  transition: transform 0.2s;
  width: 14px;
  text-align: center;
  flex-shrink: 0;
}
.progress-group-arrow.collapsed {
  transform: rotate(-90deg);
}
.progress-group-name {
  font-weight: 600;
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.progress-group-summary {
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.progress-group-rate {
  font-size: 13px;
  font-weight: 700;
  flex-shrink: 0;
  width: 42px;
  text-align: right;
}
.progress-group-body {
  padding: 0 8px 10px 22px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.progress-group-body.collapsed {
  display: none;
}
.progress-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.progress-item-header {
  display: flex;
  align-items: center;
  gap: 6px;
}
.progress-item-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.progress-item-name {
  font-size: 11px;
  color: var(--text-secondary);
  flex: 1;
  min-width: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.progress-item-count {
  font-size: 11px;
  color: var(--text-muted);
  flex-shrink: 0;
}
.progress-item-pct {
  font-size: 11px;
  font-weight: 600;
  width: 34px;
  text-align: right;
  flex-shrink: 0;
}
/* Three-segment progress bar */
.progress-bar-track {
  height: 18px;
  background: rgba(255,255,255,0.05);
  border-radius: 3px;
  overflow: hidden;
  display: flex;
}
.progress-bar-done {
  height: 100%;
  background: var(--status-done);
  transition: width 0.4s ease;
}
.progress-bar-doing {
  height: 100%;
  background: var(--status-doing);
  animation: doing-pulse 1.5s ease-in-out infinite;
  transition: width 0.4s ease;
}
.progress-bar-pending {
  height: 100%;
  background: rgba(84,110,122,0.3);
  flex: 1;
}
@keyframes doing-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.45; }
}
.progress-item-stats {
  font-size: 10px;
  color: var(--text-muted);
  display: flex;
  gap: 8px;
}

/* ===== Daily Bar Chart ===== */
.daily-bars {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  height: 140px;
  padding-top: 8px;
  overflow: hidden;
}
.daily-bar-group {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
}
.daily-bar {
  width: 100%;
  border-radius: 3px 3px 0 0;
  transition: height 0.4s ease;
  min-height: 2px;
  position: relative;
}
.daily-bar-plan {
  background: var(--accent);
  opacity: 0.5;
}
.daily-bar-actual {
  background: var(--status-done);
}
.daily-label {
  font-size: 10px;
  color: var(--text-muted);
}
.daily-bar-tooltip {
  display: none;
  position: absolute;
  top: -24px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  color: var(--text-primary);
  background: var(--bg-panel);
  padding: 2px 6px;
  border-radius: 3px;
  white-space: nowrap;
}
.daily-bar-group:hover .daily-bar-tooltip { display: block; }

/* ===== Center Area ===== */
.center {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg-primary);
  overflow: hidden;
}
.plan-container {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
  background-color: #0d1520;
  background-image:
    linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
  background-size: 40px 40px;
}
.plan-container:active { cursor: grabbing; }
.plan-svg {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  transform-origin: 0 0;
}
.plan-svg text {
  fill: var(--text-muted);
  font-size: 10px;
  user-select: none;
}

/* ===== Pile Styles ===== */
.pile-circle {
  cursor: pointer;
  transition: opacity 0.2s, filter 0.2s;
  outline: none;
}
.pile-hitarea {
  outline: none;
}
.pile-group {
  cursor: pointer;
  pointer-events: visiblePainted;
}
.pile-group:hover .pile-circle {
  filter: brightness(1.4);
  opacity: 0.85 !important;
}
.pile-label {
  font-size: 9px;
  fill: var(--text-muted);
  pointer-events: none;
  user-select: none;
}

/* ===== Line Styles ===== */
.beam-line-bg {
  stroke: var(--status-pending);
  opacity: 0.3;
}
.beam-line-drawn {
  stroke-linecap: round;
  cursor: pointer;
  transition: opacity 0.2s;
}
.beam-line-drawn:hover {
  filter: brightness(1.3);
  opacity: 0.85;
}

/* ===== Polygon Styles ===== */
.slab-poly-bg {
  fill: var(--status-pending);
  opacity: 0.15;
}
.slab-poly-drawn {
  stroke-width: 1.5;
  cursor: pointer;
  transition: opacity 0.2s;
}
.slab-poly-drawn:hover {
  filter: brightness(1.3);
  opacity: 0.85;
}
.slab-region-drawn {
  cursor: pointer;
  transition: opacity 0.2s;
}
.slab-region-drawn:hover {
  filter: brightness(1.3);
  opacity: 0.85;
}

/* ===== Zoom Controls ===== */
.zoom-controls {
  position: absolute;
  bottom: 16px;
  right: 16px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  z-index: 10;
}
.zoom-btn {
  width: 36px;
  height: 36px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-primary);
  border-radius: 6px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
.zoom-btn:hover { background: var(--bg-panel); }

/* ===== Legend Bar on Plan ===== */
.plan-legend {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(10,14,26,0.85);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  z-index: 10;
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.plan-legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text-secondary);
}
.plan-legend-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}
.plan-legend-line {
  width: 20px;
  height: 4px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ===== Drawing Mode Indicator ===== */
.mode-indicator {
  position: absolute;
  top: 12px;
  right: 12px;
  background: rgba(10,14,26,0.9);
  border: 1px solid var(--status-doing);
  border-radius: 8px;
  padding: 10px 14px;
  z-index: 10;
  font-size: 13px;
  color: var(--status-doing);
  display: none;
  align-items: center;
  gap: 8px;
}
.mode-indicator.active { display: flex; }

/* ===== Bottom Stats ===== */
/* ===== Status Popup ===== */
.status-popup {
  position: fixed;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  z-index: 100;
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  min-width: 220px;
  max-width: 300px;
}
.status-popup.active { display: block; }
.status-popup-title {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.status-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: background 0.15s;
  font-size: 13px;
}
.status-option:hover { background: rgba(255,255,255,0.05); }
.status-dot {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  flex-shrink: 0;
}
.status-option.selected {
  background: rgba(59,130,246,0.15);
  border: 1px solid var(--accent);
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ===== Detail Table ===== */
.detail-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.detail-table th {
  background: rgba(59,130,246,0.1);
  color: var(--accent-light);
  padding: 8px 6px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
.detail-table td {
  padding: 7px 6px;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: var(--text-secondary);
}
.detail-table tr:hover td {
  background: rgba(255,255,255,0.02);
}
.progress-mini {

  if (typeof supabase !== 'undefined' && supabase.createClient) {

  }
  return false;

// Auth state listener
function setupAuthListener() {
  if (!sb) return;
  try {
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN') {
        currentUser = session.user;
        updateAuthUI();
        subscribeRealtime(); // Re-subscribe with auth token
      } else if (event === 'SIGNED_OUT') {
        currentUser = null;
        updateAuthUI();
      }
    });
    // Check existing session
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        currentUser = session.user;
        updateAuthUI();
      }
    });
  } catch (e) { console.warn('Auth listener setup failed:', e); }
}

function updateAuthUI() {
  const btn = document.getElementById('authBtn');
  const userSpan = document.getElementById('authUser');
  if (currentUser) {
    btn.textContent = '登出';
    userSpan.textContent = currentUser.email;
    userSpan.style.display = 'inline';
  } else {
    btn.textContent = '登录';
    userSpan.style.display = 'none';
  }
}

async function handleAuth() {
  if (!sb) { alert('服务未连接'); return; }
  if (currentUser) {
    try { await sb.auth.signOut(); } catch (e) { console.warn('Sign out error:', e); }
    return;

  // Show simple email/password login dialog
  const email = prompt('请输入邮箱：');
  if (!email) return;
  const password = prompt('请输入密码：');
  if (!password) return;
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      alert('登录失败：' + error.message);

}

  const savedData = JSON.parse(localStorage.getItem('pileExtData') || '{}');

    p.pileNo = ext.pileNo || '';          // 桩编号
    p.designLength = ext.designLength || ''; // 设计桩长

    p.designBottomElev = ext.designBottomElev || ''; // 设计桩底标高

  if (isReadOnly()) { showReadOnlyTip(); return; }

      rockDepth: p.rockDepth, rockElev: p.rockElev,
      actualBottomElev: p.actualBottomElev, actualLength: p.actualLength
    };
  });
  localStorage.setItem('pileExtData', JSON.stringify(data));
  // Sync to Supabase
  if (sb) {
    const rows = Object.entries(data).map(([pileId, ext]) => ({
      project_id: 'meilin',
      pile_id: pileId,
      pile_no: ext.pileNo || null,
      diameter: ext.diameter || null,
      design_length: ext.designLength || null,

      rock_elev: ext.rockElev || null,
      actual_bottom_elev: ext.actualBottomElev || null,
      actual_length: ext.actualLength || null
    }));
    sb.from('pile_ext_data').upsert(rows, { onConflict: 'project_id,pile_id' }).then(({error}) => {
      if (error) console.warn('Supabase pile data write error:', error);
    });
  }
}

// Auto-calculate derived fields
function autoCalcPile(pile, field) {
  // 设计桩底标高 = 设计桩顶标高 - 设计桩长
  if (field === 'designLength' || field === 'designTopElev') {
    const top = parseFloat(pile.designTopElev);
    const len = parseFloat(pile.designLength);
    if (!isNaN(top) && !isNaN(len)) {
      pile.designBottomElev = (top - len).toFixed(2);
    }
  }
  // 入岩标高 = 设计桩底标高 + 入岩深度
  if (field === 'designBottomElev' || field === 'rockDepth') {
    const bot = parseFloat(pile.designBottomElev);
    const rd = parseFloat(pile.rockDepth);
    if (!isNaN(bot) && !isNaN(rd)) {
      pile.rockElev = (bot + rd).toFixed(2);
    }
  }
  // 实际桩长 = 设计桩顶标高 - 实际桩底标高
  if (field === 'actualBottomElev' || field === 'designTopElev') {
    const top = parseFloat(pile.designTopElev);
    const abot = parseFloat(pile.actualBottomElev);
    if (!isNaN(top) && !isNaN(abot)) {
      pile.actualLength = (top - abot).toFixed(2);
    }
  }
}

function generatePerimeterPath(points, startIdx, endIdx) {
  const result = [];
  for (let i = startIdx; i <= endIdx && i < points.length; i++) result.push(points[i]);
  return result;
}
function calcPathLength(points, startIdx, endIdx) {
  let len = 0;
  for (let i = startIdx; i < endIdx && i < points.length; i++) {
    const a = points[i], b = points[Math.min(i+1, points.length-1)];
    len += Math.sqrt((b.x-a.x)**2 + (b.y-a.y)**2);
  }
  return Math.round(len);
}

function getPlanKey() {
  const y = currentPlanPeriod.year;
  if (currentPlanLevel === 'year') return `${y}`;
  if (currentPlanLevel === 'quarter') {
    const q = Math.ceil(currentPlanPeriod.month / 3);
    return `${y}_Q${q}`;
  }
  if (currentPlanLevel === 'month') return `${y}_${currentPlanPeriod.month}`;
  return `${y}_W${currentPlanPeriod.week}`;
}

function getPlanForKey(key) {
  if (!planStore[key]) planStore[key] = {};
  return planStore[key];
}

function getPeriodLabel() {
  const y = currentPlanPeriod.year;
  if (currentPlanLevel === 'year') return `${y}年度`;
  if (currentPlanLevel === 'quarter') {
    const q = Math.ceil(currentPlanPeriod.month / 3);
    return `${y}年 Q${q}`;
  }
  if (currentPlanLevel === 'month') return `${y}年 ${currentPlanPeriod.month}月`;
  // Week: compute date range
  const weekStart = getWeekStartDate(y, currentPlanPeriod.week);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekEnd.getDate() + 6);
  const fmt = d => `${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  return `第${currentPlanPeriod.week}周 (${fmt(weekStart)}-${fmt(weekEnd)})`;
}

function getWeekStartDate(year, weekNum) {
  const jan1 = new Date(year, 0, 1);
  const dayOfWeek = jan1.getDay() || 7; // 1=Mon..7=Sun
  const daysToFirstMon = dayOfWeek <= 4 ? 1 - dayOfWeek : 8 - dayOfWeek;
  const firstMon = new Date(year, 0, 1 + daysToFirstMon);
  const result = new Date(firstMon);
  result.setDate(result.getDate() + (weekNum - 1) * 7);
  return result;
}

function getWeekOfDate(dateStr) {
  const d = new Date(dateStr);
  const y = d.getFullYear();
  const jan1 = new Date(y, 0, 1);
  const dayOfWeek = jan1.getDay() || 7;
  const daysToFirstMon = dayOfWeek <= 4 ? 1 - dayOfWeek : 8 - dayOfWeek;
  const firstMon = new Date(y, 0, 1 + daysToFirstMon);
  const diffMs = d - firstMon;
  const diffDays = Math.floor(diffMs / 86400000);
  return Math.floor(diffDays / 7) + 1;
}

function countDoneByTypes(types) {
  if (types.includes('对撑') || types.includes('角撑')) {
    // 内支撑：按长度（米）计算
    return beamPolygons.filter(bp => types.includes(bp.type) && bp.status === 'done').reduce((s, bp) => s + bp.totalLength, 0);
  }
  return piles.filter(p => types.includes(p.type) && p.status === 'done').length;
}
function countTotalByTypes(types) {
  if (types.includes('对撑') || types.includes('角撑')) {
    return beamPolygons.filter(bp => types.includes(bp.type)).reduce((s, bp) => s + bp.totalLength, 0);
  }
  return piles.filter(p => types.includes(p.type)).length;
}
function countCrownDone() {
  // 冠梁：按已完成segment的长度计算
  let d = 0; crownBeams.forEach(cb => { if (cb.segments) cb.segments.forEach(s => { if (s.status === 'done') d += cb.totalLength * (s.end - s.start) / 100; }); }); return Math.round(d * 10) / 10;
}
function countCrownTotal() {
  return Math.round(crownBeams.reduce((s, cb) => s + cb.totalLength, 0) * 10) / 10;
}
function countSlabDone() {
  // 盖板：按已完成region占该slab总region数比例分配真实面积
  let d = 0;
  slabs.forEach(s => {
    if (!s.regions || s.regions.length === 0) {
      if (s.status === 'done') d += s.area;
      return;
    }
    const doneCount = s.regions.filter(r => r.status === 'done').length;
    const totalCount = s.regions.length;
    d += s.area * doneCount / totalCount;
  });
  return Math.round(d);
}
function countSlabTotal() {
  return Math.round(slabs.reduce((s, slab) => s + slab.area, 0));
}

function prevPeriod() {
  if (currentPlanLevel === 'year') currentPlanPeriod.year--;
  else if (currentPlanLevel === 'quarter') {
    currentPlanPeriod.month -= 3;
    if (currentPlanPeriod.month < 1) { currentPlanPeriod.month += 12; currentPlanPeriod.year--; }
  } else if (currentPlanLevel === 'month') {
    currentPlanPeriod.month--;
    if (currentPlanPeriod.month < 1) { currentPlanPeriod.month = 12; currentPlanPeriod.year--; }
  } else {
    currentPlanPeriod.week--;
    if (currentPlanPeriod.week < 1) { currentPlanPeriod.week = 52; currentPlanPeriod.year--; }
  }
  renderPlanPanel();
}

function nextPeriod() {
  if (currentPlanLevel === 'year') currentPlanPeriod.year++;
  else if (currentPlanLevel === 'quarter') {
    currentPlanPeriod.month += 3;
    if (currentPlanPeriod.month > 12) { currentPlanPeriod.month -= 12; currentPlanPeriod.year++; }
  } else if (currentPlanLevel === 'month') {
    currentPlanPeriod.month++;
    if (currentPlanPeriod.month > 12) { currentPlanPeriod.month = 1; currentPlanPeriod.year++; }
  } else {
    currentPlanPeriod.week++;
    if (currentPlanPeriod.week > 52) { currentPlanPeriod.week = 1; currentPlanPeriod.year++; }
  }
  renderPlanPanel();
}

function saveBaseline() {
  // Capture initial status of all items
  const baseline = {};
  piles.forEach(p => { baseline[p.id] = p.status; });
  beamPolygons.forEach(bp => { baseline[bp.id] = bp.status; });
  beamPolygons.forEach(bp => { if (bp.segments) bp.segments.forEach((s, i) => { baseline[bp.id + '_seg_' + i] = s.status; }); });
  crownBeams.forEach(cb => { baseline[cb.id] = cb.status; if (cb.segments) cb.segments.forEach((s, i) => { baseline[cb.id + '_seg_' + i] = s.status; }); });
  slabs.forEach(slab => { baseline[slab.id] = slab.status; if (slab.regions) slab.regions.forEach((r, i) => { baseline[slab.id + '_r_' + i] = r.status; }); });
  return baseline;
}

let baseline = {};

async function loadBaselineFromCloud() {
  if (!sb) return false;
  try {
    const { data, error } = await sb.from('project_status').select('*').eq('project_id', 'meilin').order('status_date', { ascending: true });
    if (error) throw error;
    if (!data || data.length === 0) return false;
    // Reconstruct dateSnapshots from cloud data
    const cloudSnapshots = {};
    data.forEach(row => {
      if (!cloudSnapshots[row.status_date]) cloudSnapshots[row.status_date] = [];
      cloudSnapshots[row.status_date].push({ targetId: row.target_id, newStatus: row.status });
    });
    dateSnapshots = cloudSnapshots;
    localStorage.setItem('dateSnapshots', JSON.stringify(dateSnapshots));
    return true;
  } catch (e) {
    console.warn('Cloud load failed:', e);
    return false;
  }
}

function loadBaseline() {
  // Only regenerate baseline if not already cached
  const cached = localStorage.getItem('baseline');
  if (cached) {
    baseline = JSON.parse(cached);
  } else {
    baseline = saveBaseline();
    localStorage.setItem('baseline', JSON.stringify(baseline));
  }
  // Load dateSnapshots from localStorage
  const cachedSnapshots = localStorage.getItem('dateSnapshots');
  if (cachedSnapshots) {
    dateSnapshots = JSON.parse(cachedSnapshots);
  }
  // Try cloud sync in background
  loadBaselineFromCloud().then(ok => {
    if (ok) {
      const dateInput = document.getElementById('dateInput');
      if (dateInput) applyDateView(dateInput.value);
      updateStats();
    }
  });
}

function recordChange(targetId, newStatus) {
  if (isReadOnly()) { showReadOnlyTip(); return; }
  const date = document.getElementById('dateInput').value;
  if (!date) return;
  if (!dateSnapshots[date]) dateSnapshots[date] = [];
  // Check if last entry for same target in same date — if so, update it (avoid duplicates)
  const lastIdx = dateSnapshots[date].findLastIndex(e => e.targetId === targetId);
  if (lastIdx >= 0) {
    dateSnapshots[date][lastIdx].newStatus = newStatus;
  } else {
    dateSnapshots[date].push({ targetId, newStatus });
  }
  // Persist to localStorage
  try { localStorage.setItem('dateSnapshots', JSON.stringify(dateSnapshots)); } catch(e) {}
  // Dual-write to Supabase
  if (sb) {
    sb.from('project_status').upsert({
      project_id: 'meilin',
      target_id: targetId,
      status: newStatus,
      status_date: date
    }, { onConflict: 'project_id,target_id,status_date' }).then(({error}) => {
      if (error) console.warn('Supabase write error:', error);
    });
  }
}

function subscribeRealtime() {
  if (!sb) return;
  // Remove existing channel to avoid "cannot add callbacks after subscribed" error
  try { sb.removeChannel('status-changes'); } catch(e) {}
  sb.channel('status-changes')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'project_status'
    }, (payload) => {
      if (payload.eventType === 'INSERT' || payload.eventType === 'UPDATE') {
        const { target_id, status, status_date } = payload.new;
        // Add to dateSnapshots if not already present
        if (!dateSnapshots[status_date]) dateSnapshots[status_date] = [];
        const existing = dateSnapshots[status_date].find(e => e.targetId === target_id);
        if (existing) existing.newStatus = status;
        else dateSnapshots[status_date].push({ targetId: target_id, newStatus: status });
        localStorage.setItem('dateSnapshots', JSON.stringify(dateSnapshots));
        // Re-apply current date view
        const dateInput = document.getElementById('dateInput');
        if (dateInput) applyDateView(dateInput.value);
        updateStats();
      }
    })
    .subscribe();
}

function applyDateView(targetDate) {
  // Reset all items to baseline
  piles.forEach(p => { p.status = baseline[p.id] || 'pending'; });
  beamPolygons.forEach(bp => { bp.status = baseline[bp.id] || 'pending'; if (bp.segments) bp.segments.forEach((s, i) => { s.status = baseline[bp.id + '_seg_' + i] || 'pending'; }); });
  crownBeams.forEach(cb => { cb.status = baseline[cb.id] || 'pending'; if (cb.segments) cb.segments.forEach((s, i) => { s.status = baseline[cb.id + '_seg_' + i] || 'pending'; }); });
  slabs.forEach(slab => { slab.status = baseline[slab.id] || 'pending'; if (slab.regions) slab.regions.forEach((r, i) => { r.status = baseline[slab.id + '_r_' + i] || 'pending'; }); });

  // Replay all changes up to targetDate (inclusive), sorted by date
  const sortedDates = Object.keys(dateSnapshots).filter(d => d <= targetDate).sort();
  sortedDates.forEach(date => {
    dateSnapshots[date].forEach(change => {
      // Find the target and update
      setItemStatus(change.targetId, change.newStatus);
    });
  });

  refresh();
}

function setItemStatus(targetId, newStatus) {
  // Check piles
  const pile = piles.find(p => p.id === targetId);
  if (pile) { pile.status = newStatus; return; }
  // Check beam polygons
  const bp = beamPolygons.find(b => b.id === targetId);
  if (bp) { bp.status = newStatus; return; }
  // Check beam segments
  const segMatch = targetId.match(/^(.+)_seg_(\d+)$/);
  if (segMatch) {
    const bp2 = beamPolygons.find(b => b.id === segMatch[1]);
    if (bp2 && bp2.segments && bp2.segments[parseInt(segMatch[2])]) {
      bp2.segments[parseInt(segMatch[2])].status = newStatus; return;
    }
    const cb = crownBeams.find(b => b.id === segMatch[1]);
    if (cb && cb.segments && cb.segments[parseInt(segMatch[2])]) {
      cb.segments[parseInt(segMatch[2])].status = newStatus; return;
    }
  }
  // Check crown beams
  const cb2 = crownBeams.find(b => b.id === targetId);
  if (cb2) { cb2.status = newStatus; return; }
  // Check slab regions
  const slabRegionMatch = targetId.match(/^(.+)_r_(\d+)$/);
  if (slabRegionMatch) {
    const slab = slabs.find(s => s.id === slabRegionMatch[1]);
    if (slab && slab.regions && slab.regions[parseInt(slabRegionMatch[2])]) {
      slab.regions[parseInt(slabRegionMatch[2])].status = newStatus; return;
    }
  }
  // Check slabs
  const slab2 = slabs.find(s => s.id === targetId);
  if (slab2) { slab2.status = newStatus; return; }
}

function getItemIdFromTarget(target) {
  if (!target) return null;
  if (target.id) return target.id;
  if (target.type === 'pileSegment') return target.pile.id;
  if (target.type === 'beamSegment' && target.beam && target.seg) {
    const idx = target.beam.segments.indexOf(target.seg);
    return target.beam.id + '_seg_' + idx;
  }
  if (target.type === 'crownSegment' && target.cb && target.seg) {
    const idx = target.cb.segments.indexOf(target.seg);
    return target.cb.id + '_seg_' + idx;
  }
  if (target.type === 'slabRegion' && target.slab && target.region) {
    const idx = target.slab.regions.indexOf(target.region);
    return target.slab.id + '_r_' + idx;
  }
  return null;
}

function screenToSvg(clientX, clientY) {
  const rect = planContainer.getBoundingClientRect();
  const x = (clientX - rect.left) / rect.width * vbW + vbX;
  const y = (clientY - rect.top) / rect.height * vbH + vbY;
  return { x: Math.round(x), y: Math.round(y) };
}

  initPileData();

  loadPlanStore();

}

// ---- Render 基坑轮廓 ----
function renderOutline() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'outlineGroup');

  // 基坑外轮廓（使用冠梁crownBeams[0]的outerPath绘制虚线轮廓）
  const crownBeam = crownBeams && crownBeams.length > 0 ? crownBeams[0] : null;
  if (crownBeam && crownBeam.outerPath.length > 1) {
    const pts = crownBeam.outerPath.map(p => p.x + ',' + p.y).join(' ');
    const outline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
    outline.setAttribute('points', pts);
    outline.setAttribute('fill', 'none');
    outline.setAttribute('stroke', '#334155');
    outline.setAttribute('stroke-width', '2');
    outline.setAttribute('stroke-dasharray', '12,6');
    g.appendChild(outline);
  }

  svg.appendChild(g);
}

// ---- Render Piles ----
function renderPiles() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'pilesGroup');

  piles.forEach(p => {
    const pileGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    pileGroup.setAttribute('class', 'pile-group');
    pileGroup.setAttribute('data-id', p.id);

    // Base circle (all pile types)
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', p.x);
    circle.setAttribute('cy', p.y);
    circle.setAttribute('r', p.r);
    circle.setAttribute('fill', STATUS_COLORS[p.status]);
    circle.setAttribute('stroke', TYPES[p.type].color);
    circle.setAttribute('stroke-width', '1.5');
    circle.setAttribute('class', 'pile-circle');
    circle.setAttribute('opacity', p.status === 'pending' ? '0.35' : '0.85');
    pileGroup.appendChild(circle);

    // Larger invisible hitarea for easier hover/click (especially for micro piles)
    const hitR = Math.max(p.r + 2, 7);  // smaller hitarea to avoid overlapping adjacent piles
    const hitCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    hitCircle.setAttribute('cx', p.x);
    hitCircle.setAttribute('cy', p.y);
    hitCircle.setAttribute('r', String(hitR));
    hitCircle.setAttribute('fill', 'transparent');
    hitCircle.setAttribute('stroke', 'none');
    hitCircle.setAttribute('class', 'pile-hitarea');
    hitCircle.setAttribute('pointer-events', 'all');
    pileGroup.appendChild(hitCircle);

    // Double-tube jet grout pile: two overlapping circles (DXF block 600 style)
    // DXF: circle diameter=600mm, center spacing=400mm → ratio=400/600
    // Scale offset so the two circles are visually distinguishable as crossed
    if (p.type === '双管旋喷桩' && p.x2 !== undefined) {
      const dx = p.x2 - p.x;
      const dy = p.y2 - p.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      // Target: offset = radius * 0.67 (400/600 ratio) but at minimum 1.5 * radius for visibility
      const targetDist = Math.max(p.r * 1.5, dist);
      const scale = dist > 0.01 ? targetDist / dist : 0;
      const c2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c2.setAttribute('cx', p.x + dx * scale);
      c2.setAttribute('cy', p.y + dy * scale);
      c2.setAttribute('r', p.r);
      c2.setAttribute('fill', 'none');
      c2.setAttribute('stroke', TYPES[p.type].color);
      c2.setAttribute('stroke-width', '1.5');
      c2.setAttribute('class', 'pile-circle');
      c2.setAttribute('opacity', p.status === 'pending' ? '0.35' : '0.85');
      pileGroup.appendChild(c2);
    }

    // Column pile cross
    if (p.type === '立柱桩') {
      const cross = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      cross.setAttribute('stroke', '#fff');
      cross.setAttribute('stroke-width', '1');
      cross.setAttribute('opacity', '0.6');
      const l1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l1.setAttribute('x1', p.x-5); l1.setAttribute('y1', p.y); l1.setAttribute('x2', p.x+5); l1.setAttribute('y2', p.y);
      const l2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      l2.setAttribute('x1', p.x); l2.setAttribute('y1', p.y-5); l2.setAttribute('x2', p.x); l2.setAttribute('y2', p.y+5);
      cross.appendChild(l1); cross.appendChild(l2);
      pileGroup.appendChild(cross);
    }

    // Attach events to hitCircle only (not group) — avoids event conflicts between overlapping piles
    hitCircle.addEventListener('click', (e) => {
      if (editMode) return;
      e.stopPropagation();
      showPopup(e, p);
    });
    hitCircle.addEventListener('mouseenter', (e) => {
      if (!editMode) showSvgTooltip(e, { type: 'pile', id: p.id, pileType: p.type, x: p.x, y: p.y, r: p.r, status: p.status });
    });
    hitCircle.addEventListener('mouseleave', () => {
      hideSvgTooltip();
    });

    g.appendChild(pileGroup);
  });

  svg.appendChild(g);
}

// ---- Render Beams ----
function renderBeams() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'beamsGroup');

  // --- Render crown beams (冠梁) with outer + inner paths ---
  if (typeof crownBeams !== 'undefined' && crownBeams) {
    crownBeams.forEach(cb => {
      const typeColor = TYPES[cb.type] ? TYPES[cb.type].color : '#fdd835';
      const sw = cb.thickness || 3;
      const isMicro = sw < 2.5;

      // Group for this crown beam (enables hover highlight of all parts together)
      const cbGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      cbGroup.setAttribute('data-id', cb.id);
      cbGroup.setAttribute('data-type', 'crown-beam');
      cbGroup.style.pointerEvents = 'none';  // Let events pass through to piles underneath

      // No wide transparent hitarea - only actual visible lines are interactive (pointer-events: stroke)
      // For micro crown beams (thin), keep bg close to visible width to avoid overlapping piles
      const bgExtra = isMicro ? 0.3 : 4;  // micro: barely wider, main: +4
      const bgInnerExtra = isMicro ? 0.3 : 2;  // micro: barely wider, main: +2

      // Draw outer path
      if (cb.outerPath.length >= 2) {
        const pts = cb.outerPath.map(p => `${p.x},${p.y}`).join(' ');
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        bg.setAttribute('points', pts);
        bg.setAttribute('fill', 'none');
        bg.setAttribute('stroke', 'rgba(255,216,53,0.18)');
        bg.setAttribute('stroke-width', String(sw + bgExtra));
        bg.setAttribute('stroke-linecap', 'round');
        bg.setAttribute('pointer-events', 'none');
        bg.setAttribute('class', 'crown-outer-bg');
        cbGroup.appendChild(bg);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        line.setAttribute('points', pts);
        line.setAttribute('fill', 'none');
        line.setAttribute('stroke', typeColor);
        line.setAttribute('stroke-width', String(sw));
        line.setAttribute('opacity', '0.6');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('pointer-events', 'stroke');
        line.setAttribute('class', 'crown-outer-fg');
        cbGroup.appendChild(line);
      }

      // Draw inner path
      if (cb.innerPath.length >= 2) {
        const pts = cb.innerPath.map(p => `${p.x},${p.y}`).join(' ');
        const bg = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        bg.setAttribute('points', pts);
        bg.setAttribute('fill', 'none');
        bg.setAttribute('stroke', 'rgba(255,216,53,0.12)');
        bg.setAttribute('stroke-width', String(sw + bgInnerExtra));
        bg.setAttribute('stroke-linecap', 'round');
        bg.setAttribute('pointer-events', 'none');
        bg.setAttribute('class', 'crown-inner-bg');
        cbGroup.appendChild(bg);
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        line.setAttribute('points', pts);
        line.setAttribute('fill', 'none');
        line.setAttribute('stroke', typeColor);
        line.setAttribute('stroke-width', String(sw));
        line.setAttribute('opacity', '0.45');
        line.setAttribute('stroke-linecap', 'round');
        line.setAttribute('pointer-events', 'stroke');
        line.setAttribute('class', 'crown-inner-fg');
        cbGroup.appendChild(line);
      }

      // Draw closure lines (端部封闭线)
      if (cb.closures && cb.closures.length > 0) {
        cb.closures.forEach(cl => {
          const cLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          cLine.setAttribute('x1', cl.x1);
          cLine.setAttribute('y1', cl.y1);
          cLine.setAttribute('x2', cl.x2);
          cLine.setAttribute('y2', cl.y2);
          cLine.setAttribute('stroke', typeColor);
          cLine.setAttribute('stroke-width', String(sw));
          cLine.setAttribute('opacity', '0.5');
          cLine.setAttribute('stroke-linecap', 'round');
          cLine.setAttribute('pointer-events', 'none');
          cLine.setAttribute('class', 'crown-closure');
          cbGroup.appendChild(cLine);
        });
      }

      // Hover: highlight outer + inner + closures together
      cbGroup.addEventListener('mouseenter', (e) => {
        if (editMode) return;
        cbGroup.querySelectorAll('.crown-outer-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.35)');
          el.setAttribute('stroke-width', String(sw + bgExtra + 4));
        });
        cbGroup.querySelectorAll('.crown-outer-fg').forEach(el => {
          el.setAttribute('opacity', '1');
          el.setAttribute('stroke-width', String(sw + 1));
        });
        cbGroup.querySelectorAll('.crown-inner-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.3)');
          el.setAttribute('stroke-width', String(sw + bgInnerExtra + 4));
        });
        cbGroup.querySelectorAll('.crown-inner-fg').forEach(el => {
          el.setAttribute('opacity', '0.85');
          el.setAttribute('stroke-width', String(sw + 1));
        });
        cbGroup.querySelectorAll('.crown-closure').forEach(el => {
          el.setAttribute('opacity', '0.9');
          el.setAttribute('stroke-width', String(sw + 1));
        });
        const label = isMicro ? '微型桩冠梁' : '主冠梁';
        showSvgTooltip(e, { type: 'crown', id: cb.id, label, totalLength: cb.totalLength, thickness: sw });
      });
      cbGroup.addEventListener('mouseleave', () => {
        // Restore original styles
        cbGroup.querySelectorAll('.crown-outer-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.18)');
          el.setAttribute('stroke-width', String(sw + bgExtra));
        });
        cbGroup.querySelectorAll('.crown-outer-fg').forEach(el => {
          el.setAttribute('opacity', '0.6');
          el.setAttribute('stroke-width', String(sw));
        });
        cbGroup.querySelectorAll('.crown-inner-bg').forEach(el => {
          el.setAttribute('stroke', 'rgba(255,216,53,0.12)');
          el.setAttribute('stroke-width', String(sw + bgInnerExtra));
        });
        cbGroup.querySelectorAll('.crown-inner-fg').forEach(el => {
          el.setAttribute('opacity', '0.45');
        });
        cbGroup.querySelectorAll('.crown-closure').forEach(el => {
          el.setAttribute('opacity', '0.5');
          el.setAttribute('stroke-width', String(sw));
        });
        hideSvgTooltip();
      });
      cbGroup.addEventListener('click', (e) => {
        if (editMode) return;
        e.stopPropagation();
        const label = isMicro ? '微型桩冠梁' : '主冠梁';
        showCrownPopup(e, cb, label);
      });

      g.appendChild(cbGroup);
    });
  }

  // --- Render polygon beams (beamPolygons) ---
  const STATUS_FILL = {
    pending: 'rgba(160,180,200,0.25)',
    doing:   'rgba(255,200,50,0.35)',
    done:    'rgba(100,200,100,0.35)'
  };
  const STATUS_STROKE = {
    pending: 'rgba(160,180,200,0.5)',
    doing:   'rgba(255,180,50,0.7)',
    done:    'rgba(80,180,80,0.7)'
  };

  beamPolygons.forEach(bp => {
    const polyGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    const ptsStr = bp.points.map(p => `${p.x},${p.y}`).join(' ');
    
    // Filled polygon (visual only, no interaction — lets events pass through to piles below)
    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    poly.setAttribute('points', ptsStr);
    poly.setAttribute('fill', STATUS_FILL[bp.status] || STATUS_FILL.pending);
    poly.setAttribute('stroke', STATUS_STROKE[bp.status] || STATUS_STROKE.pending);
    poly.setAttribute('stroke-width', '1.5');
    poly.setAttribute('stroke-linejoin', 'round');
    poly.setAttribute('class', 'beam-polygon');
    poly.setAttribute('data-id', bp.id);
    poly.setAttribute('pointer-events', 'none');
    poly.style.transition = 'fill 0.3s, stroke 0.3s';
    polyGroup.appendChild(poly);

    // Stroke-only hitarea on top (interacts only on edges, fill area passes through)
    const hitarea = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
    hitarea.setAttribute('points', ptsStr);
    hitarea.setAttribute('fill', 'none');
    hitarea.setAttribute('stroke', 'transparent');
    hitarea.setAttribute('stroke-width', '6');
    hitarea.setAttribute('stroke-linejoin', 'round');
    hitarea.setAttribute('pointer-events', 'stroke');
    hitarea.style.cursor = 'pointer';
    polyGroup.appendChild(hitarea);

    // Hover events on hitarea
    hitarea.addEventListener('mouseenter', (e) => {
      if (editMode) return;
      showSvgTooltip(e, { type: 'beamPolygon', bp });
      poly.setAttribute('stroke', 'rgba(100,200,255,0.8)');
      poly.setAttribute('stroke-width', '2.5');
    });
    hitarea.addEventListener('mouseleave', () => {
      hideSvgTooltip();
      poly.setAttribute('stroke', STATUS_STROKE[bp.status] || STATUS_STROKE.pending);
      poly.setAttribute('stroke-width', '1.5');
    });
    hitarea.addEventListener('click', (e) => {
      if (editMode) return;
      e.stopPropagation();
      showBeamPolygonPopup(e, bp);
    });

    g.appendChild(polyGroup);
  });

  svg.appendChild(g);
}

function getSubPath(path, startFrac, endFrac) {
  const totalLen = pathLength(path);
  if (totalLen === 0) return path;
  const startDist = totalLen * (startFrac / 100);
  const endDist = totalLen * (endFrac / 100);
  return interpolatePath(path, startDist, endDist);
}

function pathLength(path) {
  let len = 0;
  for (let i = 1; i < path.length; i++) {
    len += Math.sqrt((path[i].x - path[i-1].x)**2 + (path[i].y - path[i-1].y)**2);
  }
  return len;
}

function interpolatePath(path, startDist, endDist) {
  const result = [{ x: path[0].x, y: path[0].y }];
  let accumulated = 0;
  for (let i = 1; i < path.length; i++) {
    const dx = path[i].x - path[i-1].x;
    const dy = path[i].y - path[i-1].y;
    const segLen = Math.sqrt(dx*dx + dy*dy);
    if (accumulated + segLen >= startDist && accumulated < endDist) {
      if (accumulated < startDist) {
        const t = (startDist - accumulated) / segLen;
        result.push({ x: path[i-1].x + dx*t, y: path[i-1].y + dy*t });
      }
      if (accumulated + segLen <= endDist) {
        result.push({ x: path[i].x, y: path[i].y });
      } else {
        const t = (endDist - accumulated) / segLen;
        result.push({ x: path[i-1].x + dx*t, y: path[i-1].y + dy*t });
      }
    }
    accumulated += segLen;
  }
  return result;
}


// ---- Clip slabs by beam polygons (beam priority > slab) ----
function clipSlabsByBeams() {
  const CLIP_SCALE = 1000;
  function toClipPath(pts) {
    return pts.map(p => ({ X: Math.round(p.x * CLIP_SCALE), Y: Math.round(p.y * CLIP_SCALE) }));
  }
  function fromClipPath(path) {
    return path.map(p => ({ x: p.X / CLIP_SCALE, y: p.Y / CLIP_SCALE }));
  }

  slabs.forEach(slab => {
    // Save existing region statuses before re-clipping
    const existingStatuses = slab.regions ? slab.regions.map(r => r.status) : [];

    const slabClipPath = toClipPath(slab.polygon);

    const clipper = new ClipperLib.Clipper();
    clipper.AddPath(slabClipPath, ClipperLib.PolyType.ptSubject, true);
    // Expand beams slightly (0.5 SVG units) so co-edge beams properly cut through slab
    const EXPAND_DELTA = Math.round(0.5 * CLIP_SCALE); // 500 in clip scale
    beamPolygons.forEach(bp => {
      const bpPath = toClipPath(bp.points);
      const co = new ClipperLib.ClipperOffset(0.5, 0.5);
      co.AddPath(bpPath, ClipperLib.JoinType.jtMiter, ClipperLib.EndType.etClosedPolygon);
      const expanded = new ClipperLib.Paths();
      co.Execute(expanded, EXPAND_DELTA);
      if (expanded.length > 0) {
        clipper.AddPath(expanded[0], ClipperLib.PolyType.ptClip, true);
      } else {
        clipper.AddPath(bpPath, ClipperLib.PolyType.ptClip, true);
      }
    });

    const solution = new ClipperLib.Paths();
    clipper.Execute(ClipperLib.ClipType.ctDifference, solution);

    if (solution.length === 0) {
      // Slab fully covered by beams
      slab.regions = [];
      return;
    }

    // Filter tiny fragments and convert back
    const newRegions = [];
    solution.forEach((path, idx) => {
      const svgPts = fromClipPath(path);
      // Calculate area using shoelace
      let area = 0;
      for (let i = 0; i < svgPts.length; i++) {
        const j = (i + 1) % svgPts.length;
        area += svgPts[i].x * svgPts[j].y;
        area -= svgPts[j].x * svgPts[i].y;
      }
      area = Math.abs(area) / 2;
      if (area > 50) { // Skip tiny fragments from beam expansion
        // Restore existing status if available, otherwise use slab's default status
        const status = idx < existingStatuses.length ? existingStatuses[idx] : slab.status;
        newRegions.push({ polygon: svgPts, area: Math.round(area), status });
      }
    });
    slab.regions = newRegions;
  });
}

// ---- Render Slabs ----
function renderSlabs() {
  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.setAttribute('id', 'slabsGroup');

  slabs.forEach(slab => {
    // Render sub-regions (if any) - if regions exist, skip background polygon
    if (slab.regions && slab.regions.length > 0) {
      // Background polygon to fill gaps between regions (no interaction)
      const bgPts = slab.polygon.map(p => `${p.x},${p.y}`).join(' ');
      const bgPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      bgPoly.setAttribute('points', bgPts);
      bgPoly.setAttribute('fill', STATUS_COLORS[slab.status]);
      bgPoly.setAttribute('stroke', 'none');
      bgPoly.setAttribute('opacity', '0.15');
      bgPoly.setAttribute('pointer-events', 'none');
      g.appendChild(bgPoly);

      slab.regions.forEach((region, rIdx) => {
        const rPts = region.polygon.map(p => `${p.x},${p.y}`).join(' ');
        const rPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
        rPoly.setAttribute('points', rPts);
        rPoly.setAttribute('fill', STATUS_COLORS[region.status]);
        rPoly.setAttribute('stroke', TYPES[slab.type].color);
        rPoly.setAttribute('stroke-width', '1.5');
        rPoly.setAttribute('class', 'slab-region-drawn');
        rPoly.setAttribute('data-id', slab.id + '-r' + rIdx);
        rPoly.setAttribute('opacity', '0.55');
        rPoly.addEventListener('click', (e) => {
          e.stopPropagation();
          showSlabRegionPopup(e, slab, region);
        });
        rPoly.addEventListener('mouseenter', (e) => {
          if (!editMode) {
            showSvgTooltip(e, { type: 'slabRegion', slab, region });
            rPoly.setAttribute('opacity', '0.85');
          }
        });
        rPoly.addEventListener('mouseleave', () => {
          hideSvgTooltip();
          rPoly.setAttribute('opacity', '0.55');
        });
        g.appendChild(rPoly);
      });
    } else {
      // Background polygon (full slab outline, only when no regions)
      const pts = slab.polygon.map(p => `${p.x},${p.y}`).join(' ');
      const bgPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      bgPoly.setAttribute('points', pts);
      bgPoly.setAttribute('fill', STATUS_COLORS[slab.status]);
      bgPoly.setAttribute('stroke', TYPES[slab.type].color);
      bgPoly.setAttribute('stroke-width', '1.5');
      bgPoly.setAttribute('class', 'slab-poly-drawn');
      bgPoly.setAttribute('data-id', slab.id);
      bgPoly.setAttribute('opacity', '0.2');
      bgPoly.addEventListener('click', (e) => {
        if (editMode) return;
        e.stopPropagation();
        showSlabPopup(e, slab);
      });
      bgPoly.addEventListener('mouseenter', (e) => {
        if (!editMode) showSvgTooltip(e, { type: 'slab', slab });
      });
      bgPoly.addEventListener('mouseleave', () => {
        hideSvgTooltip();
      });
      g.appendChild(bgPoly);
    }

  });

  svg.appendChild(g);
}

function polygonCentroid(pts) {
  const n = pts.length;
  const cx = pts.reduce((s, p) => s + p.x, 0) / n;
  const cy = pts.reduce((s, p) => s + p.y, 0) / n;
  return { x: cx, y: cy };
}

function setStatus(status) {
  if (!currentTarget) return;
  if (currentTarget.type === 'beamSeg') {
    const oldStatus = currentTarget.seg.status;
    currentTarget.seg.status = status;
    undoStack.push({ action: 'changeSegStatus', beamId: currentTarget.beam.id, seg: currentTarget.seg, oldStatus });
    recordChange(getItemIdFromTarget(currentTarget), status);
  } else if (currentTarget.type === 'slabRegion') {
    const slab = currentTarget.slab;
    const oldStatus = currentTarget.region.status;
    currentTarget.region.status = status;
    const idx = slab.regions.indexOf(currentTarget.region);
    undoStack.push({ action: 'changeRegionStatus', slabId: slab.id, regionIdx: idx, oldStatus });
    recordChange(getItemIdFromTarget(currentTarget), status);
  } else if (currentTarget.type === 'slab') {
    currentTarget.slab.status = status;
    recordChange(getItemIdFromTarget(currentTarget), status);
  } else if (currentTarget.type === 'crownSeg') {
    const oldStatus = currentTarget.seg.status;
    currentTarget.seg.status = status;
    undoStack.push({ action: 'changeCrownSegStatus', cbId: currentTarget.cb.id, seg: currentTarget.seg, oldStatus });
    recordChange(getItemIdFromTarget(currentTarget), status);
  } else if (currentTarget.type === 'beamPolygon') {
    currentTarget.bp.status = status;
    recordChange(getItemIdFromTarget(currentTarget), status);
  } else {
    const oldStatus = currentTarget.status;
    currentTarget.status = status;
    undoStack.push({ action: 'changePileStatus', pileId: currentTarget.id, oldStatus });
    recordChange(getItemIdFromTarget(currentTarget), status);
  }
  document.getElementById('statusPopup').classList.remove('active');
  document.getElementById('popupDeleteSegBtn').style.display = 'none';
  currentTarget = null;
  refresh();
}

function calcStats() {
  const stats = {};
  Object.keys(TYPES).forEach(type => {
    if (TYPES[type].category === 'pile') {
      const items = piles.filter(p => p.type === type);
      stats[type] = {
        total: items.length,
        done: items.filter(p => p.status === 'done').length,
        doing: items.filter(p => p.status === 'doing').length,
        pending: items.filter(p => p.status === 'pending').length,
        unit: TYPES[type].unit
      };
    } else if (TYPES[type].category === 'beam') {
      const items = beams.filter(b => b.type === type);
      let totalLen = 0, doneLen = 0, doingLen = 0;
      items.forEach(b => {
        totalLen += b.totalLength;
        b.segments.forEach(s => {
          const segLen = b.totalLength * (s.end - s.start) / 100;
          if (s.status === 'done') doneLen += segLen;
          else if (s.status === 'doing') doingLen += segLen;
        });
      });
      stats[type] = { total: Math.round(totalLen * 10) / 10, done: Math.round(doneLen * 10) / 10, doing: Math.round(doingLen * 10) / 10, pending: Math.round((totalLen - doneLen - doingLen) * 10) / 10, unit: TYPES[type].unit };
    } else if (TYPES[type].category === 'slab') {
      const items = slabs.filter(s => s.type === type);
      const total = items.reduce((s, sl) => s + sl.area, 0);
      const done = items.filter(s => s.status === 'done').reduce((s, sl) => s + sl.area, 0);
      const doing = items.filter(s => s.status === 'doing').reduce((s, sl) => s + sl.area, 0);
      stats[type] = { total, done, doing, pending: total - done - doing, unit: TYPES[type].unit };
    }
  });
  return stats;
}

function renderProgressList() {
  const container = document.getElementById('progressList');

  // Calculate stats for a given type name
  function typeStats(type) {
    if (TYPES[type] && TYPES[type].category === 'pile') {
      const items = piles.filter(p => p.type === type);
      return { total: items.length, done: items.filter(p => p.status === 'done').length, doing: items.filter(p => p.status === 'doing').length };
    } else if (TYPES[type] && TYPES[type].category === 'beam') {
      const items = beamPolygons.filter(b => b.type === type);
      let totalLen = 0, doneLen = 0, doingLen = 0;
      items.forEach(b => { totalLen += b.totalLength; if (b.status==='done') doneLen+=b.totalLength; else if (b.status==='doing') doingLen+=b.totalLength; });
      return { total: Math.round(totalLen * 10) / 10, done: Math.round(doneLen * 10) / 10, doing: Math.round(doingLen * 10) / 10 };
    } else if (TYPES[type] && TYPES[type].category === 'slab') {
      const items = slabs.filter(s => s.type === type);
      const total = items.reduce((s,sl) => s+sl.area, 0);
      // Calculate done/doing based on region statuses (proportional to slab.area)
      let done = 0, doing = 0;
      items.forEach(sl => {
        if (!sl.regions || sl.regions.length === 0) {
          if (sl.status === 'done') done += sl.area;
          else if (sl.status === 'doing') doing += sl.area;
          return;
        }
        const doneCount = sl.regions.filter(r => r.status === 'done').length;
        const doingCount = sl.regions.filter(r => r.status === 'doing').length;
        const totalCount = sl.regions.length;
        done += sl.area * doneCount / totalCount;
        doing += sl.area * doingCount / totalCount;
      });
      return { total: Math.round(total), done: Math.round(done), doing: Math.round(doing) };
    }
    return { total: 0, done: 0, doing: 0 };
  }

  // Calculate stats for a node (leaf = single type, branch = sum of children)
  function nodeStats(node) {
    let result;
    if (node.customStats) {
      result = node.customStats();
    } else if (node.types) {
      let total = 0, done = 0, doing = 0;
      node.types.forEach(t => { const s = typeStats(t); total += s.total; done += s.done; doing += s.doing; });
      result = { total, done, doing };
    } else if (node.children) {
      let total = 0, done = 0, doing = 0;
      node.children.forEach(c => { const s = nodeStats(c); total += s.total; done += s.done; doing += s.doing; });
      result = { total, done, doing };
    } else {
      result = { total: 0, done: 0, doing: 0 };
    }
    // Round to 1 decimal for non-integer values (beam lengths)
    if (result.total !== Math.round(result.total)) {
      result.total = Math.round(result.total * 10) / 10;
      result.done = Math.round(result.done * 10) / 10;
      result.doing = Math.round(result.doing * 10) / 10;
    }
    return result;
  }

  // Recursive HTML builder
  let groupId = 0;
  function buildNode(node, depth, unit) {
    const s = nodeStats(node);
    const pending = s.total - s.done - s.doing;
    const rate = s.total > 0 ? Math.round(s.done / s.total * 100) : 0;
    const dPct = s.total > 0 ? (s.done / s.total * 100) : 0;
    const doPct = s.total > 0 ? (s.doing / s.total * 100) : 0;
    const id = groupId++;
    const indent = 10 + depth * 8;
    const hasChildren = node.children && node.children.length > 0;
    const color = node.color || (node.types && node.types.length === 1 && TYPES[node.types[0]] ? TYPES[node.types[0]].color : 'var(--text-muted)');
    // Format values: beam unit (米) needs 1 decimal, others are integers
    const fmt = (v) => (unit === '米') ? v.toFixed(1) : v;

    let html = '';
    if (hasChildren) {
      // Branch node: collapsible group
      html += `<div class="progress-group">
        <div class="progress-group-header" onclick="toggleProgressGroup('${id}')" style="padding-left:${indent}px">
          <span class="progress-group-arrow" id="pgArrow${id}">▼</span>
          <span class="progress-group-name">${node.name}</span>
          <span class="progress-group-summary">${fmt(s.total)}${unit}</span>
          <span class="progress-group-rate" style="color:${rate > 0 ? 'var(--status-done)' : 'var(--text-muted)'}">${rate}%</span>
        </div>
        <div class="progress-group-body" id="pgBody${id}">`;
      node.children.forEach(c => { html += buildNode(c, depth + 1, unit); });
      html += `</div></div>`;
    } else {
      // Leaf node: show bar
      html += `<div class="progress-item" style="padding-left:${indent}px">
        <div class="progress-item-header">
          <span class="progress-item-dot" style="background:${color}"></span>
          <span class="progress-item-name" title="${node.name}">${node.name}</span>
          <span class="progress-item-count">${fmt(s.total)}${unit}</span>
          <span class="progress-item-pct" style="color:${rate > 0 ? 'var(--status-done)' : 'var(--text-muted)'}">${rate}%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-done" style="width:${dPct}%"></div>
          <div class="progress-bar-doing" style="width:${doPct}%"></div>
          <div class="progress-bar-pending"></div>
        </div>
        <div class="progress-item-stats">
          <span>已完成 ${s.done}</span>
          <span>施工中 ${s.doing}</span>
          <span>未施工 ${pending}</span>
        </div>
      </div>`;
    }
    return html;
  }

  // Tree definition matching user's engineering hierarchy
  const tree = [
    {
      name: '桩类', unit: '根',
      children: [
        {
          name: '支护桩',
          children: [
            {
              name: '咬合桩',
              children: [
                { name: '荤桩', types: ['咬合桩-荤桩'] },
                { name: '素桩', types: ['咬合桩-素桩'] }
              ]
            },
            { name: '双管旋喷桩', types: ['双管旋喷桩'] },
            { name: '微型桩', types: ['微型桩'] }
          ]
        },
        {
          name: '箱涵支护桩',
          children: [
            { name: '荤桩', types: ['箱涵支护桩-荤桩'] },
            { name: '素桩', types: ['箱涵支护桩-素桩'] }
          ]
        },
        { name: '立柱桩', types: ['立柱桩'] },
        { name: '工程桩', types: ['工程桩'] }
      ]
    },
    {
      name: '梁类', unit: '米',
      children: [
        {
          name: '冠梁',
          children: [
            { name: '支护桩冠梁', color: '#FFD835', customStats: () => {
              const main = crownBeams.filter(b => b.thickness >= 3);
              let t = 0, d = 0, dg = 0;
              main.forEach(b => { t += b.totalLength; b.segments.forEach(s => { const sl = b.totalLength*(s.end-s.start)/100; if(s.status==='done') d+=sl; else if(s.status==='doing') dg+=sl; }); });
              return { total: Math.round(t * 10) / 10, done: Math.round(d * 10) / 10, doing: Math.round(dg * 10) / 10 };
            }},
            { name: '微型桩冠梁', color: '#FFD835', customStats: () => {
              const micro = crownBeams.filter(b => b.thickness < 3);
              let t = 0, d = 0, dg = 0;
              micro.forEach(b => { t += b.totalLength; b.segments.forEach(s => { const sl = b.totalLength*(s.end-s.start)/100; if(s.status==='done') d+=sl; else if(s.status==='doing') dg+=sl; }); });
              return { total: Math.round(t * 10) / 10, done: Math.round(d * 10) / 10, doing: Math.round(dg * 10) / 10 };
            }}
          ]
        },
        {
          name: '内支撑',
          children: [
            { name: '对撑', types: ['对撑'] },
            { name: '角撑', types: ['角撑'] }
          ]
        }
      ]
    },
    {
      name: '板类', unit: 'm²',
      children: [
        { name: '盖板', types: ['盖板'] }
      ]
    }
  ];

  let html = '';
  tree.forEach(g => { html += buildNode(g, 0, g.unit); });
  container.innerHTML = html;
}

function renderOverallProgress() {
  const el = document.getElementById('overallProgress');
  // 权重：桩类75%（按根），梁类15%（按米），板类10%（按m²）
  // 桩类：咬合桩+旋喷桩+微型桩+立柱桩+工程桩
  const pileTotal = piles.length;
  const pileDone = piles.filter(p => p.status === 'done').length;
  const pileRate = pileTotal > 0 ? pileDone / pileTotal : 0;

  // 梁类：对撑+角撑+冠梁（按米）
  const beamTotalLen = beamPolygons.reduce((s, bp) => s + bp.totalLength, 0) + crownBeams.reduce((s, cb) => s + cb.totalLength, 0);
  let beamDoneLen = beamPolygons.filter(bp => bp.status === 'done').reduce((s, bp) => s + bp.totalLength, 0);
  crownBeams.forEach(cb => { if (cb.segments) cb.segments.forEach(seg => { if (seg.status === 'done') beamDoneLen += cb.totalLength * (seg.end - seg.start) / 100; }); });
  beamDoneLen = Math.round(beamDoneLen * 10) / 10;
  const beamRate = beamTotalLen > 0 ? beamDoneLen / beamTotalLen : 0;

  // 板类：盖板（按m²）
  const slabTotalArea = slabs.reduce((s, sl) => s + sl.area, 0);
  let slabDoneArea = 0;
  slabs.forEach(sl => {
    if (!sl.regions || sl.regions.length === 0) { if (sl.status === 'done') slabDoneArea += sl.area; return; }
    slabDoneArea += sl.area * sl.regions.filter(r => r.status === 'done').length / sl.regions.length;
  });
  slabDoneArea = Math.round(slabDoneArea);
  const slabRate = slabTotalArea > 0 ? slabDoneArea / slabTotalArea : 0;

  const overallRate = pileRate * 0.75 + beamRate * 0.15 + slabRate * 0.10;
  const pctRaw = overallRate * 100;
  const pct = pctRaw < 1 ? Math.round(pctRaw * 10) / 10 : Math.round(pctRaw); // <1%时保留1位小数

  el.innerHTML = `${pct}%<span style="display:inline-block;width:60px;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden;vertical-align:middle;margin-left:6px"><span style="display:block;height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),#4fc3f7);border-radius:3px"></span></span><span style="font-size:11px;color:var(--text-muted);margin-left:4px">总体</span>`;
}

// ZOOM & PAN (via viewBox)
// ============================================================

let vbX = 0, vbY = 0, vbW = 1400, vbH = 900;
let isPanning = false, hasDragged = false, panStartX, panStartY, vbStartX, vbStartY;

function setupZoom() {
  const container = document.getElementById('planContainer');
  updateViewBox();

  // Pan: bind to container so the entire area is draggable
  container.addEventListener('mousedown', (e) => {
    if (typeof drawingMode !== 'undefined' && drawingMode) return;
    // Ignore if clicking on buttons/inputs inside the container
    if (e.target.closest('button, input, .plan-legend, .zoom-controls, .panel-toggle')) return;
    isPanning = true;
    hasDragged = false;
    panStartX = e.clientX;
    panStartY = e.clientY;
    vbStartX = vbX;
    vbStartY = vbY;
    container.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    const dx = e.clientX - panStartX;
    const dy = e.clientY - panStartY;
    if (!hasDragged && Math.sqrt(dx*dx + dy*dy) < 5) return;
    hasDragged = true;
    const rect = container.getBoundingClientRect();
    const scaleX = vbW / rect.width;
    const scaleY = vbH / rect.height;
    vbX = vbStartX - dx * scaleX;
    vbY = vbStartY - dy * scaleY;
    updateViewBox();
  });
  window.addEventListener('mouseup', () => {
    isPanning = false;
    container.style.cursor = '';
  });
  // Suppress stray clicks after a drag
  container.addEventListener('click', (e) => {
    if (hasDragged) {
      e.stopPropagation();
      hasDragged = false;
    }
  }, true);
  container.addEventListener('wheel', (e) => {
    // Only zoom when wheeling over the map area, not over buttons/legend
    if (e.target.closest('button, .plan-legend, .zoom-controls, .panel-toggle')) return;
    e.preventDefault();
    // Use createSVGPoint + getScreenCTM for pixel-perfect coordinate conversion
    const pt = svg.createSVGPoint();
    pt.x = e.clientX;
    pt.y = e.clientY;
    const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());
    const mx = svgPt.x;
    const my = svgPt.y;
    const factor = e.deltaY > 0 ? 1.1 : 0.9;  // scroll down = zoom out, scroll up = zoom in
    const newW = Math.min(1800, Math.max(100, vbW * factor));
    const newH = Math.min(1200, Math.max(67, vbH * factor));
    // Use actual factor (may differ from requested if clamped)
    const actualFactorX = newW / vbW;
    const actualFactorY = newH / vbH;
    vbX = mx - (mx - vbX) * actualFactorX;
    vbY = my - (my - vbY) * actualFactorY;
    vbW = newW;
    vbH = newH;
    updateViewBox();
  }, { passive: false });
}

function updateViewBox() {
  svg.setAttribute('viewBox', `${vbX} ${vbY} ${vbW} ${vbH}`);
}

function zoomIn() {
  const cx = vbX + vbW / 2, cy = vbY + vbH / 2;
  vbW = Math.max(100, vbW * 0.8);
  vbH = Math.max(67, vbH * 0.8);
  vbX = cx - vbW / 2;
  vbY = cy - vbH / 2;
  updateViewBox();
}
function zoomOut() {
  const cx = vbX + vbW / 2, cy = vbY + vbH / 2;
  vbW = Math.min(1800, vbW * 1.2);
  vbH = Math.min(1200, vbH * 1.2);
  vbX = cx - vbW / 2;
  vbY = cy - vbH / 2;
  updateViewBox();
}
function resetView() { vbX = 0; vbY = 0; vbW = 1400; vbH = 900; updateViewBox(); }
