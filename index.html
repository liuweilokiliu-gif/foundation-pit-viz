// ---- Find nearest point on beam path ----
function findNearestPercentOnPath(path, pt) {
  let bestDist = Infinity, bestFrac = 0;
  let accumulated = 0;
  for (let i = 1; i < path.length; i++) {
    const a = path[i - 1], b = path[i];
    const dx = b.x - a.x, dy = b.y - a.y;
    const segLen = Math.sqrt(dx * dx + dy * dy);
    if (segLen < 0.01) continue;
    // Project point onto segment
    const t = Math.max(0, Math.min(1, ((pt.x - a.x) * dx + (pt.y - a.y) * dy) / (segLen * segLen)));
    const px = a.x + dx * t, py = a.y + dy * t;
    const dist = Math.sqrt((pt.x - px) ** 2 + (pt.y - py) ** 2);
    const frac = (accumulated + t * segLen) / pathLength(path) * 100;
    if (dist < bestDist) {
      bestDist = dist;
      bestFrac = frac;
    }
    accumulated += segLen;
  }
  return { frac: bestFrac, dist: bestDist };
}

// ---- Find which beam was clicked (proximity test) ----
function findBeamAtPoint(svgPt, threshold) {
  threshold = threshold || 12; // pixels in SVG coords
  let best = null, bestDist = Infinity;
  beams.forEach(beam => {
    const result = findNearestPercentOnPath(beam.path, svgPt);
    if (result.dist < bestDist) {
      bestDist = result.dist;
      best = { beam, percent: result.frac, dist: result.dist };
    }
  });
  if (best && best.dist <= threshold) return best;
  return null;
}

// ---- Find which slab was clicked ----
function findSlabAtPoint(svgPt) {
  for (const slab of slabs) {
    if (pointInPolygon(svgPt, slab.polygon)) return slab;
  }
  return null;
}

function pointInPolygon(pt, poly) {
  let inside = false;
  for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
    const xi = poly[i].x, yi = poly[i].y;
    const xj = poly[j].x, yj = poly[j].y;
    if (((yi > pt.y) !== (yj > pt.y)) && (pt.x < (xj - xi) * (pt.y - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

// ---- Setup editing events ----
function setupEditingEvents() {
  const svgEl = document.getElementById('planSvg');

  // Click on SVG for editing
  svgEl.addEventListener('click', (e) => {
    if (!editMode) return;
    // Don't intercept clicks on pile circles or status popup
    if (e.target.closest('.pile-circle') || e.target.closest('.status-popup')) return;

    const pt = screenToSvg(e.clientX, e.clientY);

    if (editMode === 'beam') {
      handleBeamEditClick(pt, e);
    } else if (editMode === 'slab') {
      handleSlabEditClick(pt, e);
    }
  });

  // Mouse move for preview
  svgEl.addEventListener('mousemove', (e) => {
    if (!editMode) return;
    const pt = screenToSvg(e.clientX, e.clientY);

    if (editMode === 'beam' && editingTarget && editingBeamStart !== null) {
      // Preview beam segment
      clearPreview();
      const g = document.getElementById('drawPreview');
      const startPct = editingBeamStart;
      const endResult = findNearestPercentOnPath(editingTarget.path, pt);
      const minPct = Math.min(startPct, endResult.frac);
      const maxPct = Math.max(startPct, endResult.frac);
      const segPath = getSubPath(editingTarget.path, minPct, maxPct);
      if (segPath && segPath.length >= 2) {
        const previewLine = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
        const pts = segPath.map(p => `${p.x},${p.y}`).join(' ');
        previewLine.setAttribute('points', pts);
        previewLine.setAttribute('fill', 'none');
        previewLine.setAttribute('stroke', '#60a5fa');
        previewLine.setAttribute('stroke-width', '8');
        previewLine.setAttribute('stroke-linecap', 'round');
        previewLine.setAttribute('opacity', '0.6');
        previewLine.setAttribute('stroke-dasharray', '6,4');
        g.appendChild(previewLine);

        // Show length preview
        const segLen = Math.round(editingTarget.totalLength * (maxPct - minPct) / 100);
        const midPath = segPath[Math.floor(segPath.length / 2)];
        const lenText = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        lenText.setAttribute('x', midPath.x);
        lenText.setAttribute('y', midPath.y - 10);
        lenText.setAttribute('text-anchor', 'middle');
        lenText.setAttribute('fill', '#60a5fa');
        lenText.setAttribute('font-size', '11');
        lenText.setAttribute('pointer-events', 'none');
        lenText.textContent = segLen + 'm (' + Math.round(minPct) + '%-' + Math.round(maxPct) + '%)';
        g.appendChild(lenText);
      }
    } else if (editMode === 'slab' && editingTarget && slabEditPoints.length > 0) {
      // Preview slab sub-region polygon
      clearPreview();
      const g = document.getElementById('drawPreview');
      const allPts = [...slabEditPoints, pt];
      const ptsStr = allPts.map(p => `${p.x},${p.y}`).join(' ');

      const previewPoly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
      previewPoly.setAttribute('points', ptsStr);
      previewPoly.setAttribute('fill', '#60a5fa');
      previewPoly.setAttribute('opacity', '0.2');
      previewPoly.setAttribute('stroke', '#60a5fa');
      previewPoly.setAttribute('stroke-width', '2');
      previewPoly.setAttribute('stroke-dasharray', '4,3');
      previewPoly.setAttribute('pointer-events', 'none');
      g.appendChild(previewPoly);

      // Vertex markers
      slabEditPoints.forEach(p => {
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        marker.setAttribute('cx', p.x);
        marker.setAttribute('cy', p.y);
        marker.setAttribute('r', '4');
        marker.setAttribute('fill', '#60a5fa');
        marker.setAttribute('opacity', '0.9');
        marker.setAttribute('pointer-events', 'none');
        g.appendChild(marker);
      });
    }
  });

  // Double click for slab region closing
  svgEl.addEventListener('dblclick', (e) => {
    if (editMode === 'slab' && editingTarget && slabEditPoints.length >= 3) {
      e.preventDefault();
      e.stopPropagation();
      finishSlabRegion();
    }
  });

  // Right click to cancel current edit or exit edit mode
  planContainer.addEventListener('contextmenu', (e) => {
    if (editMode) {
      e.preventDefault();
      if (editMode === 'beam' && editingBeamStart !== null) {
        // Cancel current segment marking
        editingBeamStart = null;
        clearPreview();
        updateModeIndicator('标记梁段：点击梁上的位置设置起点');
      } else if (editMode === 'slab' && slabEditPoints.length > 0) {
        // Cancel current sub-region drawing
        slabEditPoints = [];
        clearPreview();
        updateModeIndicator('标记板区：在盖板内点击添加顶点（双击闭合）');
      } else {
        cancelEditing();
      }
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      cancelEditing();
    }
    if (e.key === 'Enter' && editMode === 'slab' && editingTarget && slabEditPoints.length >= 3) {
      finishSlabRegion();
    }
    if (e.ctrlKey && e.key === 'z') {
      e.preventDefault();
      undoLastEdit();
    }
  });
}

// ---- Handle beam edit click ----
function handleBeamEditClick(pt, e) {
  const hit = findBeamAtPoint(pt);
  if (!hit) {
    // Clicked outside beams - deselect current
    if (editingTarget) {
      editingTarget = null;
      editingBeamStart = null;
      clearPreview();
      clearEditingHighlights();
      updateModeIndicator('标记梁段：点击一条梁进入编辑');
    }
    return;
  }

  const beam = hit.beam;
  const percent = hit.percent;

  if (!editingTarget || editingTarget.id !== beam.id) {
    // Selecting a new beam
    editingTarget = beam;
    editingBeamStart = null;
    clearPreview();
    clearEditingHighlights();
    // Add editing highlight (thicker dashed outline)
    highlightBeam(beam);
    updateModeIndicator(`标记梁段：${beam.id} - 点击梁上的位置设置起点`);
    return;
  }

  if (editingBeamStart === null) {
    // Set start point
    editingBeamStart = percent;
    // Mark start point visually
    clearPreview();
    const g = document.getElementById('drawPreview');
    const startPtOnPath = getPointAtPercent(beam.path, percent);
    const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    marker.setAttribute('cx', startPtOnPath.x);
    marker.setAttribute('cy', startPtOnPath.y);
    marker.setAttribute('r', '5');
    marker.setAttribute('fill', '#60a5fa');
    marker.setAttribute('opacity', '0.9');
    marker.setAttribute('pointer-events', 'none');
    g.appendChild(marker);
    updateModeIndicator(`标记梁段：${beam.id} - 起点已设(${Math.round(percent)}%)，点击终点位置`);
  } else {
    // Set end point - create segment
    const startPct = Math.min(editingBeamStart, percent);
    const endPct = Math.max(editingBeamStart, percent);
    if (endPct - startPct < 1) {
      // Too short, treat as new start
      editingBeamStart = percent;
      clearPreview();
      const g = document.getElementById('drawPreview');
      const startPtOnPath = getPointAtPercent(beam.path, percent);
      const marker = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      marker.setAttribute('cx', startPtOnPath.x);
      marker.setAttribute('cy', startPtOnPath.y);
      marker.setAttribute('r', '5');
      marker.setAttribute('fill', '#60a5fa');
      marker.setAttribute('opacity', '0.9');
      marker.setAttribute('pointer-events', 'none');
      g.appendChild(marker);
      return;
    }

    // Create new segment - show status popup
    const newSeg = { start: Math.round(startPct), end: Math.round(endPct), status: 'doing' };
    beam.segments.push(newSeg);
    // Compact overlapping segments
    compactBeamSegments(beam);

    clearPreview();
    editingBeamStart = null;
    undoStack.push({ action: 'addSeg', beamId: beam.id });
    refresh();
    highlightBeam(beam);
    updateModeIndicator(`标记梁段：${beam.id} - 段已添加，继续点击或退出`);

    // Show popup for the new segment to set status
    const midPercent = (newSeg.start + newSeg.end) / 2;
    const midPt = getPointAtPercent(beam.path, midPercent);
    const rect = planContainer.getBoundingClientRect();
    const fakeEvent = {
      clientX: rect.left + midPt.x / vbW * rect.width,
      clientY: rect.top + midPt.y / vbH * rect.height,
      stopPropagation: () => {}
    };
    showBeamSegmentPopup(fakeEvent, beam, newSeg);
  }
}

// ---- Get a point at a given percentage along a path ----
function getPointAtPercent(path, pct) {
  const total = pathLength(path);
  const targetDist = total * (pct / 100);
  let accumulated = 0;
  for (let i = 1; i < path.length; i++) {
    const a = path[i - 1], b = path[i];
    const dx = b.x - a.x, dy = b.y - a.y;
    const segLen = Math.sqrt(dx * dx + dy * dy);
    if (accumulated + segLen >= targetDist && segLen > 0) {
      const t = (targetDist - accumulated) / segLen;
      return { x: a.x + dx * t, y: a.y + dy * t };
    }
    accumulated += segLen;
  }
  return path[path.length - 1];
}

// ---- Compact overlapping segments ----
function compactBeamSegments(beam) {
  // Sort segments by start
  beam.segments.sort((a, b) => a.start - b.start);
  // Merge overlapping segments with same status
  const merged = [];
  let i = 0;
  while (i < beam.segments.length) {
    let cur = { ...beam.segments[i] };
    while (i + 1 < beam.segments.length && beam.segments[i + 1].start <= cur.end && beam.segments[i + 1].status === cur.status) {
      cur.end = Math.max(cur.end, beam.segments[i + 1].end);
      i++;
    }
    merged.push(cur);
    i++;
  }
  beam.segments = merged;
}

// ---- Highlight beam in edit mode ----
function highlightBeam(beam) {
  clearEditingHighlights();
  const g = document.getElementById('beamsGroup');
  if (!g) return;
  const hl = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
  const pts = beam.path.map(p => `${p.x},${p.y}`).join(' ');
  hl.setAttribute('points', pts);
  hl.setAttribute('fill', 'none');
  hl.setAttribute('stroke', '#60a5fa');
  hl.setAttribute('stroke-width', '10');
  hl.setAttribute('opacity', '0.25');
  hl.setAttribute('class', 'beam-editing-highlight');
  hl.setAttribute('pointer-events', 'none');
  g.appendChild(hl);
}

// ---- Handle slab edit click ----
function handleSlabEditClick(pt, e) {
  const hit = findSlabAtPoint(pt);
  if (!hit) {
    if (editingTarget) {
      editingTarget = null;
      slabEditPoints = [];
      clearPreview();
      clearEditingHighlights();
      updateModeIndicator('标记板区：点击一块盖板进入编辑');
    }
    return;
  }

  const slab = hit;

  if (!editingTarget || editingTarget.id !== slab.id) {
    // Select a new slab
    editingTarget = slab;
    slabEditPoints = [];
    clearPreview();
    clearEditingHighlights();
    highlightSlab(slab);
    updateModeIndicator(`标记板区：${slab.id} - 在盖板内点击添加顶点（双击闭合）`);
    return;
  }

  // Check that the point is inside the slab
  if (!pointInPolygon(pt, slab.polygon)) {
    return;
  }

  // Add vertex
  slabEditPoints.push(pt);
  const n = slabEditPoints.length;
  if (n < 3) {
    updateModeIndicator(`标记板区：${slab.id} - 已标记${n}个点，继续点击`);
  } else {
    updateModeIndicator(`标记板区：${slab.id} - 已标记${n}个点，双击或Enter闭合`);
  }
}

// ---- Finish slab sub-region ----
function finishSlabRegion() {
  if (!editingTarget || slabEditPoints.length < 3) return;

  const slab = editingTarget;
  const newRegion = {
    polygon: [...slabEditPoints],
    status: 'doing'
  };

  if (!slab.regions) slab.regions = [];
  slab.regions.push(newRegion);
  undoStack.push({ action: 'addRegion', slabId: slab.id });

  slabEditPoints = [];
  clearPreview();
  refresh();
  highlightSlab(slab);
  updateModeIndicator(`标记板区：${slab.id} - 区域已添加，继续标记或退出`);

  // Show popup for the new region
  const centroid = polygonCentroid(newRegion.polygon);
  const rect = planContainer.getBoundingClientRect();
  const fakeEvent = {
    clientX: rect.left + centroid.x / vbW * rect.width,
    clientY: rect.top + centroid.y / vbH * rect.height,
    stopPropagation: () => {}
  };
  showSlabRegionPopup(fakeEvent, slab, newRegion);
}

// ---- Highlight slab in edit mode ----
function highlightSlab(slab) {
  clearEditingHighlights();
  const g = document.getElementById('slabsGroup');
  if (!g) return;
  const pts = slab.polygon.map(p => `${p.x},${p.y}`).join(' ');
  const hl = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
  hl.setAttribute('points', pts);
  hl.setAttribute('fill', 'none');
  hl.setAttribute('stroke', '#60a5fa');
  hl.setAttribute('stroke-width', '3');
  hl.setAttribute('stroke-dasharray', '6,3');
  hl.setAttribute('opacity', '0.6');
  hl.setAttribute('class', 'slab-editing-highlight');
  hl.setAttribute('pointer-events', 'none');
  g.appendChild(hl);
}

// ---- Undo last edit action ----
function undoLastEdit() {
  if (undoStack.length === 0) return;
  const action = undoStack.pop();
  if (action.action === 'addSeg') {
    const beam = beams.find(b => b.id === action.beamId);
    if (beam && beam.segments.length > 0) {
      beam.segments.pop();
    }
  } else if (action.action === 'removeSeg') {
    const beam = beams.find(b => b.id === action.beamId);
    if (beam) {
      beam.segments.push(action.seg);
    }
  } else if (action.action === 'addRegion') {
    const slab = slabs.find(s => s.id === action.slabId);
    if (slab && slab.regions && slab.regions.length > 0) {
      slab.regions.pop();
    }
  } else if (action.action === 'removeRegion') {
    const slab = slabs.find(s => s.id === action.slabId);
    if (slab && slab.regions) {
      slab.regions.push(action.region);
    }
  } else if (action.action === 'changeSegStatus') {
    const beam = beams.find(b => b.id === action.beamId);
    if (beam) {
      const seg = beam.segments.find(s => s.start === action.seg.start && s.end === action.seg.end);
      if (seg) seg.status = action.oldStatus;
    }
  } else if (action.action === 'changeRegionStatus') {
    const slab = slabs.find(s => s.id === action.slabId);
    if (slab && slab.regions) {
      const region = slab.regions[action.regionIdx];
      if (region) region.status = action.oldStatus;
    }
  }
  refresh();
}

// ---- Delete current segment/region ----
function deleteSegment() {
  if (!currentTarget) return;
  if (currentTarget.type === 'beamSeg') {
    const beam = currentTarget.beam;
    const seg = currentTarget.seg;
    const idx = beam.segments.indexOf(seg);
    if (idx >= 0) {
      beam.segments.splice(idx, 1);
      undoStack.push({ action: 'removeSeg', beamId: beam.id, seg });
    }
  } else if (currentTarget.type === 'slabRegion') {
    const slab = currentTarget.slab;
    const region = currentTarget.region;
    const idx = slab.regions.indexOf(region);
    if (idx >= 0) {
      slab.regions.splice(idx, 1);
      undoStack.push({ action: 'removeRegion', slabId: slab.id, region });
    }
  }
  document.getElementById('statusPopup').classList.remove('active');
  document.getElementById('popupDeleteSegBtn').style.display = 'none';
  currentTarget = null;
  refresh();
}

// ---- Tooltip ----
function showSvgTooltip(e, data) {
  const tooltip = document.getElementById('svgTooltip');
  let html = '';
  if (data.type === 'pile') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.pileType || data.type}</span></div>
      <div class="tt-row"><span class="tt-label">状态:</span><span class="tt-val">${STATUS_LABELS[data.status]}</span></div>
    `;
  } else if (data.type === 'beam') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.beam.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.beam.type}</span></div>
      <div class="tt-row"><span class="tt-label">长度:</span><span class="tt-val">${data.beam.totalLength}m</span></div>
      <div class="tt-row"><span class="tt-label">段状态:</span><span class="tt-val">${data.seg ? STATUS_LABELS[data.seg.status] : '未施工'}</span></div>
    `;
  } else if (data.type === 'slab') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.slab.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.slab.type}</span></div>
      <div class="tt-row"><span class="tt-label">面积:</span><span class="tt-val">${data.slab.area}m\u00B2</span></div>
      <div class="tt-row"><span class="tt-label">状态:</span><span class="tt-val">${STATUS_LABELS[data.slab.status]}</span></div>
    `;
  } else if (data.type === 'slabRegion') {
    html = `
      <div class="tt-row"><span class="tt-label">板ID:</span><span class="tt-val">${data.slab.id}</span></div>
      <div class="tt-row"><span class="tt-label">子区域:</span><span class="tt-val">区域 #${data.slab.regions.indexOf(data.region) + 1}</span></div>
      <div class="tt-row"><span class="tt-label">状态:</span><span class="tt-val">${STATUS_LABELS[data.region.status]}</span></div>
    `;
  } else if (data.type === 'beamPolygon') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.bp.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.bp.type}</span></div>
      <div class="tt-row"><span class="tt-label">长度:</span><span class="tt-val">${data.bp.totalLength}m</span></div>
      <div class="tt-row"><span class="tt-label">状态:</span><span class="tt-val">${STATUS_LABELS[data.bp.status]}</span></div>
    `;
  } else if (data.type === 'crown') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.label}</span></div>
      <div class="tt-row"><span class="tt-label">总长:</span><span class="tt-val">${data.totalLength}m</span></div>
    `;
  } else if (data.type === 'boxCulvert') {
    html = `
      <div class="tt-row"><span class="tt-label">ID:</span><span class="tt-val">${data.id}</span></div>
      <div class="tt-row"><span class="tt-label">类型:</span><span class="tt-val">${data.label}</span></div>
      <div class="tt-row"><span class="tt-label">节点数:</span><span class="tt-val">${data.points}</span></div>
    `;
  }
  tooltip.innerHTML = html;
  const container = document.getElementById('planContainer');
  const rect = container.getBoundingClientRect();
  const svg = document.getElementById('planSvg');
  const svgRect = svg.getBoundingClientRect();
  const vb = svg.viewBox.baseVal;
  // If data has SVG coordinates (x, y), position tooltip near the element; otherwise follow mouse
  let tipX, tipY;
  if (data.x !== undefined && data.y !== undefined) {
    tipX = svgRect.left + (data.x - vb.x) / vb.width * svgRect.width - rect.left + 15;
    tipY = svgRect.top + (data.y - vb.y) / vb.height * svgRect.height - rect.top - 5;
  } else {
    tipX = e.clientX - rect.left + 12;
    tipY = e.clientY - rect.top - 10;
  }
  tooltip.style.left = tipX + 'px';
  tooltip.style.top = tipY + 'px';
  tooltip.classList.add('active');
}

function hideSvgTooltip() {
  document.getElementById('svgTooltip').classList.remove('active');
}

// ============================================================
// PANEL TOGGLE
// ============================================================

function togglePanel(side) {
  const panel = document.getElementById(side === 'left' ? 'leftPanel' : 'rightPanel');
  const btn = document.getElementById(side === 'left' ? 'toggleLeft' : 'toggleRight');
  const isCollapsed = panel.classList.toggle('collapsed');
  btn.textContent = side === 'left' ? (isCollapsed ? '❯' : '❮') : (isCollapsed ? '❮' : '❯');
  // Hide/show resize handle when panel collapses/expands
  const handle = document.getElementById('leftPanelResize');
  if (handle) handle.style.display = isCollapsed ? 'none' : '';
  // Re-center the SVG view after panel toggle
  setTimeout(() => resetView(), 350);
}

// Panel resize by dragging the handle
(function() {
  const handle = document.getElementById('leftPanelResize');
  const panel = document.getElementById('leftPanel');
  if (!handle || !panel) return;
  let isResizing = false, startX, startW;
  handle.addEventListener('mousedown', (e) => {
    isResizing = true;
    startX = e.clientX;
    startW = panel.getBoundingClientRect().width;
    handle.classList.add('active');
    document.body.style.cursor = 'ew-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!isResizing) return;
    const dx = e.clientX - startX;
    const newW = Math.min(600, Math.max(200, startW + dx));
    panel.style.width = newW + 'px';
  });
  window.addEventListener('mouseup', () => {
    if (!isResizing) return;
    isResizing = false;
    handle.classList.remove('active');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// Auto-collapse panels on narrow screens
function checkViewportWidth() {
  const w = window.innerWidth;
  const leftPanel = document.getElementById('leftPanel');
  const rightPanel = document.getElementById('rightPanel');
  const toggleLeft = document.getElementById('toggleLeft');
  const toggleRight = document.getElementById('toggleRight');
  if (w < 1000) {
    if (!leftPanel.classList.contains('collapsed')) {
      leftPanel.classList.add('collapsed');
      toggleLeft.textContent = '❯';
    }
    if (!rightPanel.classList.contains('collapsed')) {
      rightPanel.classList.add('collapsed');
      toggleRight.textContent = '❮';
    }
  } else if (w < 1400) {
    // Collapse right panel only
    if (!rightPanel.classList.contains('collapsed')) {
      rightPanel.classList.add('collapsed');
      toggleRight.textContent = '❮';
    }
  }
}
window.addEventListener('resize', () => {
  checkViewportWidth();
  resetView();
});
// Run on init
setTimeout(() => { checkViewportWidth(); resetView(); }, 100);
